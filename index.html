<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>xchodedos — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c10;
      --surface:  #111318;
      --border:   #1e2230;
      --accent:   #5b6ef5;
      --accent-h: #7b8bff;
      --text:     #e8eaf2;
      --muted:    #5a5f75;
      --error:    #f05b6e;
      --success:  #3dd68c;
      --mono:     'JetBrains Mono', monospace;
      --sans:     'Space Grotesk', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,110,245,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,110,245,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      position: relative;
      box-shadow: 0 0 0 1px rgba(91,110,245,.08), 0 32px 64px rgba(0,0,0,.5);
    }

    /* accent glow top edge */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 50%; transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 2rem;
    }

    .brand-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-family: var(--mono);
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: -.02em;
      color: #fff;
      flex-shrink: 0;
    }

    .brand-name {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: -.03em;
      color: var(--text);
    }

    .brand-badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--accent);
      background: rgba(91,110,245,.12);
      border: 1px solid rgba(91,110,245,.25);
      border-radius: 4px;
      padding: .2rem .5rem;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -.03em;
      color: var(--text);
      margin-bottom: .35rem;
    }

    .subtitle {
      font-size: .875rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: .875rem;
      top: 50%; transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      width: 16px; height: 16px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--sans);
      font-size: .9rem;
      padding: .75rem .875rem .75rem 2.6rem;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,110,245,.15);
    }

    input::placeholder { color: var(--muted); }

    .toggle-pw {
      position: absolute;
      right: .875rem;
      top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted);
      padding: 0;
      display: grid; place-items: center;
    }
    .toggle-pw:hover { color: var(--text); }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: .45rem;
      cursor: pointer;
      font-size: .8rem;
      color: var(--muted);
      user-select: none;
    }

    .remember input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px; height: 14px;
      cursor: pointer;
    }

    .forgot {
      font-size: .8rem;
      color: var(--accent);
      text-decoration: none;
    }
    .forgot:hover { color: var(--accent-h); text-decoration: underline; }

    .btn {
      width: 100%;
      padding: .85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -.01em;
      transition: background .15s, transform .1s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: var(--accent-h);
      box-shadow: 0 0 20px rgba(91,110,245,.4);
    }

    .btn:active { transform: scale(.98); }

    .btn.loading .btn-text { opacity: 0; }
    .btn.loading .spinner { opacity: 1; }

    .spinner {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      transition: opacity .15s;
    }

    .spinner svg { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      margin-top: 1rem;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .82rem;
      display: none;
    }

    .msg.error {
      display: block;
      background: rgba(240,91,110,.1);
      border: 1px solid rgba(240,91,110,.25);
      color: var(--error);
    }

    .msg.success {
      display: block;
      background: rgba(61,214,140,.1);
      border: 1px solid rgba(61,214,140,.25);
      color: var(--success);
    }

    .footer {
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner svg { animation: none; }
      .btn, input { transition: none; }
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-mark">xc</div>
    <span class="brand-name">xchodedos</span>
    <span class="brand-badge">Admin</span>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to the admin dashboard.</p>

  <div class="field">
    <label for="email">Email</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      <input type="email" id="email" placeholder="admin@xchodedos.com" autocomplete="email"/>
    </div>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      <button class="toggle-pw" id="togglePw" type="button" aria-label="Toggle password visibility">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="row">
    <label class="remember">
      <input type="checkbox" id="remember"/> Keep me signed in
    </label>
    <a href="#" class="forgot">Forgot password?</a>
  </div>

  <button class="btn" id="loginBtn" type="button" onclick="handleLogin()">
    <span class="btn-text">Sign in</span>
    <span class="spinner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
    </span>
  </button>

  <div class="msg" id="msg"></div>

  <div class="footer">xchodedos v1.0 &nbsp;·&nbsp; admin portal</div>
</div>

<script>
  // Toggle password visibility
  const pwInput = document.getElementById('password');
  document.getElementById('togglePw').addEventListener('click', () => {
    const isText = pwInput.type === 'text';
    pwInput.type = isText ? 'password' : 'text';
    document.getElementById('eyeIcon').innerHTML = isText
      ? '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  });

  // Enter key submits
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (!email || !password) {
      showMsg('Please enter your email and password.', 'error');
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.disabled = true;

    // Simulate auth — replace this with your real API call
    setTimeout(() => {
      btn.classList.remove('loading');
      btn.disabled = false;

      // Demo: hardcoded check — swap with real backend
      if (email === 'admin@xchodedos.com' && password === 'admin123') {
        showMsg('Signed in successfully. Redirecting…', 'success');
        // window.location.href = '/dashboard';
      } else {
        showMsg('Incorrect email or password. Please try again.', 'error');
      }
    }, 1400);
  }
</script>

</body>
</html>
