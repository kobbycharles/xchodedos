<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1a56db"/>
  <title>xchodedos — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & tokens ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand:       #1a56db;
      --brand-dark:  #1239a5;
      --brand-light: #e8eeff;
      --danger:      #ef4444;
      --danger-bg:   #fef2f2;
      --success:     #12b76a;
      --success-bg:  #ecfdf3;
      --gray-50:     #f9fafb;
      --gray-100:    #f3f4f6;
      --gray-200:    #e5e7eb;
      --gray-300:    #d1d5db;
      --gray-400:    #9ca3af;
      --gray-500:    #6b7280;
      --gray-600:    #4b5563;
      --gray-700:    #374151;
      --gray-800:    #1f2937;
      --gray-900:    #111827;
      --border:      #e5e7eb;
      --surface:     #ffffff;
      --font-display:'Space Grotesk', sans-serif;
      --font-body:   'Inter', sans-serif;
      --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-full: 9999px;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-body);
      background: linear-gradient(160deg, #eef2ff 0%, #f5f7ff 60%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      color: var(--gray-800);
    }

    /* ── Layout ───────────────────────────────────────────── */
    .login-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2rem 1.25rem;
      max-width: 440px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Brand ────────────────────────────────────────────── */
    .brand-block { text-align: center; margin-bottom: 2.5rem; }

    .brand-icon {
      width: 72px; height: 72px;
      background: var(--brand);
      border-radius: 20px;
      display: grid;
      place-items: center;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 28px rgba(26,86,219,.35);
    }

    .brand-icon svg { color: #fff; }

    .brand-name {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--gray-900);
      letter-spacing: -.04em;
      margin-bottom: .3rem;
    }

    .brand-sub { font-size: .875rem; color: var(--gray-400); }

    /* ── Card ─────────────────────────────────────────────── */
    .login-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 2rem 1.75rem;
      box-shadow: 0 4px 28px rgba(0,0,0,.07);
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: .25rem;
    }

    .login-sub { font-size: .85rem; color: var(--gray-400); margin-bottom: 1.75rem; }

    /* ── Form elements ────────────────────────────────────── */
    .form-group { margin-bottom: 1.1rem; }

    .form-label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      color: var(--gray-600);
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: .4rem;
    }

    .form-input {
      width: 100%;
      background: var(--gray-50);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--gray-800);
      font-family: var(--font-body);
      font-size: .95rem;
      padding: .75rem .9rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .form-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(26,86,219,.12);
      background: #fff;
    }

    .form-input::placeholder { color: var(--gray-300); }

    /* ── Password field ───────────────────────────────────── */
    .pw-wrap { position: relative; }

    .pw-wrap .form-input { padding-right: 3rem; }

    .pw-toggle {
      position: absolute;
      right: .75rem;
      top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: var(--gray-400);
      cursor: pointer;
      padding: .25rem;
      line-height: 0;
      border-radius: 4px;
    }
    .pw-toggle:hover { color: var(--gray-700); }

    /* ── Forgot link ──────────────────────────────────────── */
    .forgot-row {
      text-align: right;
      margin-top: -.4rem;
      margin-bottom: 1.25rem;
    }
    .forgot-link { font-size: .8rem; color: var(--brand); text-decoration: none; }
    .forgot-link:hover { text-decoration: underline; }

    /* ── Button ───────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: .9rem;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      transition: background .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(26,86,219,.3);
    }
    .btn-login:hover  { background: var(--brand-dark); box-shadow: 0 4px 16px rgba(26,86,219,.4); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .6; pointer-events: none; }

    .btn-label { display: block; }

    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .btn-login.loading .btn-label { visibility: hidden; }
    .btn-login.loading .spinner   { display: block; }

    /* ── Error message ────────────────────────────────────── */
    .error-msg {
      display: none;
      margin-top: 1rem;
      padding: .75rem .9rem;
      background: var(--danger-bg);
      border: 1px solid #fca5a5;
      border-radius: var(--r-sm);
      font-size: .83rem;
      color: #991b1b;
      line-height: 1.5;
    }
    .error-msg.show { display: block; }

    /* ── Setup banner ─────────────────────────────────────── */
    .setup-banner {
      display: none;
      margin-bottom: 1.25rem;
      padding: 1rem;
      background: #fffbeb;
      border: 1.5px solid #f59e0b;
      border-radius: var(--r-md);
      font-size: .82rem;
      color: #92400e;
      line-height: 1.6;
    }
    .setup-banner.show { display: block; }
    .setup-banner strong { display: block; font-weight: 700; margin-bottom: .25rem; }

    /* ── Footer ───────────────────────────────────────────── */
    .footer-note {
      text-align: center;
      margin-top: 1.75rem;
      font-size: .75rem;
      color: var(--gray-400);
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <!-- Brand -->
  <div class="brand-block">
    <div class="brand-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/>
        <circle cx="7.5" cy="17.5" r="2.5"/>
        <circle cx="16.5" cy="17.5" r="2.5"/>
      </svg>
    </div>
    <div class="brand-name">xchodedos</div>
    <div class="brand-sub">Hire Purchase Car Management</div>
  </div>

  <!-- Card -->
  <div class="login-card">

    <div class="login-title">Sign in</div>
    <div class="login-sub">Enter your credentials to continue.</div>

    <!-- Setup warning (shown if Supabase not yet configured) -->
    <div class="setup-banner" id="setupBanner">
      <strong>⚠️ Supabase not configured</strong>
      Open <code>js/supabase.js</code> and replace <code>YOUR_PROJECT_ID</code> and <code>YOUR_ANON_KEY</code> with your real Supabase project credentials, then push to GitHub and redeploy.
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input class="form-input" type="email" id="email"
             placeholder="you@example.com"
             autocomplete="email" inputmode="email"/>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="pw-wrap">
        <input class="form-input" type="password" id="password"
               placeholder="••••••••" autocomplete="current-password"/>
        <button class="pw-toggle" id="pwToggle" type="button" aria-label="Show/hide password">
          <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot-row">
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn-login" id="loginBtn" type="button">
      <span class="btn-label">Sign in</span>
      <div class="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg"></div>

  </div>

  <div class="footer-note">xchodedos v1.0 &nbsp;·&nbsp; © 2025</div>

</div>

<!-- ═══════════════════════════════════════════════════════════
  SUPABASE SETUP
  1. Go to https://supabase.com → your project → Settings → API
  2. Replace the two values below with your real credentials
  3. Push to GitHub → Vercel auto-redeploys
════════════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ▼▼▼ PASTE YOUR SUPABASE CREDENTIALS HERE ▼▼▼
  const SUPABASE_URL     = 'https://YOUR_PROJECT_ID.supabase.co';
  const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
  // ▲▲▲ ─────────────────────────────────────── ▲▲▲

  const isConfigured = !SUPABASE_URL.includes('YOUR_PROJECT_ID');

  if (!isConfigured) {
    document.getElementById('setupBanner').classList.add('show');
  }

  const db = isConfigured
    ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  const ROLE_ROUTES = {
    driver:               'pages/driver/dashboard.html',
    relationship_officer: 'pages/officer/dashboard.html',
    super_admin:          'pages/admin/dashboard.html',
    lead:                 'pages/lead/status.html',
  };

  // ── Redirect if already logged in ──────────────────────────
  if (db) {
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) redirectByRole(session.user.id);
    });
  }

  async function redirectByRole(userId) {
    const { data } = await db.from('profiles').select('role').eq('id', userId).single();
    if (data?.role) {
      window.location.href = '/' + (ROLE_ROUTES[data.role] || '');
    }
  }

  // ── Password toggle ────────────────────────────────────────
  const pwInput = document.getElementById('password');
  document.getElementById('pwToggle').addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>`;
  });

  // ── Login ──────────────────────────────────────────────────
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errorMsg.classList.remove('show');

    if (!isConfigured) {
      errorMsg.textContent = 'Supabase is not configured yet. See the yellow banner above.';
      errorMsg.classList.add('show');
      return;
    }

    if (!email || !password) {
      errorMsg.textContent = 'Please enter your email and password.';
      errorMsg.classList.add('show');
      return;
    }

    loginBtn.classList.add('loading');
    loginBtn.disabled = true;

    try {
      const { data, error } = await db.auth.signInWithPassword({ email, password });
      if (error) throw error;
      await redirectByRole(data.user.id);
    } catch (err) {
      let msg = err.message || 'Sign in failed. Please try again.';
      if (msg.includes('Invalid login')) msg = 'Incorrect email or password.';
      if (msg.includes('Email not confirmed')) msg = 'Please confirm your email before signing in.';
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;
    }
  }

  loginBtn.addEventListener('click', handleLogin);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>

</body>
</html>
