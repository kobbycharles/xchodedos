<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1a56db"/>
  <title>xchodedos — Sign In</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="/css/app.css"/>
  <style>
    body {
      background: linear-gradient(160deg, #eef2ff 0%, #f5f7ff 60%);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    .login-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2rem 1.25rem;
      max-width: 420px;
      margin: 0 auto;
      width: 100%;
    }

    .brand-block {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-icon {
      width: 64px; height: 64px;
      background: var(--brand);
      border-radius: 18px;
      display: grid;
      place-items: center;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 24px rgba(26,86,219,.35);
    }

    .brand-icon svg { color: #fff; }

    .brand-name {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gray-900);
      letter-spacing: -.03em;
      margin-bottom: .25rem;
    }

    .brand-sub {
      font-size: .85rem;
      color: var(--gray-400);
    }

    .login-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1.75rem 1.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: .25rem;
    }

    .login-sub {
      font-size: .82rem;
      color: var(--gray-400);
      margin-bottom: 1.5rem;
    }

    .pw-wrap { position: relative; }

    .pw-toggle {
      position: absolute;
      right: .75rem;
      top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: var(--gray-400);
      padding: .25rem;
      cursor: pointer;
      line-height: 0;
    }

    .pw-toggle:hover { color: var(--gray-700); }

    .pw-wrap .form-input { padding-right: 2.75rem; }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: .78rem;
      color: var(--brand);
      margin-top: -.5rem;
      margin-bottom: 1rem;
    }
    .forgot-link:hover { text-decoration: underline; }

    .login-btn {
      width: 100%;
      padding: .875rem;
      font-size: .95rem;
      margin-top: .5rem;
      position: relative;
    }

    .login-btn .spinner {
      position: absolute;
      display: none;
    }

    .login-btn.loading .btn-label { visibility: hidden; }
    .login-btn.loading .spinner   { display: block; }

    .error-msg {
      margin-top: 1rem;
      padding: .75rem .875rem;
      background: var(--danger-bg);
      border: 1px solid #fca5a5;
      border-radius: var(--r-sm);
      font-size: .82rem;
      color: #991b1b;
      display: none;
    }

    .error-msg.show { display: block; }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .75rem;
      color: var(--gray-400);
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="brand-block">
    <div class="brand-icon">
      <!-- Car icon -->
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/>
        <circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/>
      </svg>
    </div>
    <div class="brand-name">xchodedos</div>
    <div class="brand-sub">Hire Purchase Car Management</div>
  </div>

  <div class="login-card">
    <div class="login-title">Sign in</div>
    <div class="login-sub">Enter your credentials to continue.</div>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input class="form-input" type="email" id="email"
             placeholder="you@example.com" autocomplete="email" inputmode="email"/>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="pw-wrap">
        <input class="form-input" type="password" id="password"
               placeholder="••••••••" autocomplete="current-password"/>
        <button class="pw-toggle" id="pwToggle" type="button" aria-label="Toggle password">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <a href="/pages/forgot-password.html" class="forgot-link">Forgot password?</a>

    <button class="btn btn-primary login-btn" id="loginBtn" type="button">
      <span class="btn-label">Sign in</span>
      <div class="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="footer-note">xchodedos v1.0 &nbsp;·&nbsp; © 2025</div>

</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
  import { login, getSession, redirectByRole } from '/js/auth.js';

  // Redirect if already logged in
  const session = await getSession();
  if (session) await redirectByRole();

  // Password toggle
  const pwInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');
  document.getElementById('pwToggle').addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>`;
  });

  // Login handler
  const btn = document.getElementById('loginBtn');
  const errMsg = document.getElementById('errorMsg');

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errMsg.classList.remove('show');

    if (!email || !password) {
      errMsg.textContent = 'Please enter your email and password.';
      errMsg.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      await login(email, password);
    } catch (err) {
      errMsg.textContent = err.message || 'Sign in failed. Please try again.';
      errMsg.classList.add('show');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', handleLogin);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>

</body>
</html>
