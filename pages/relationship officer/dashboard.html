<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — Officer Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3;
      --warning:#f59e0b; --warning-bg:#fffbeb;
      --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-300:#d1d5db; --gray-400:#9ca3af; --gray-500:#6b7280;
      --gray-600:#4b5563; --gray-700:#374151; --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --surface:#fff; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); letter-spacing:-.02em; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; flex-shrink:0; margin-left:auto; }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    .greeting { margin-bottom:1.5rem; }
    .greeting-name { font-family:var(--font-display); font-size:1.3rem; font-weight:700; color:var(--gray-900); letter-spacing:-.02em; }
    .greeting-role { font-size:.8rem; color:var(--gray-400); margin-top:.15rem; }

    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1.5rem; }
    .stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:1rem; box-shadow:var(--shadow-sm); }
    .stat-card.brand { border-left:3px solid var(--brand); }
    .stat-card.green { border-left:3px solid var(--success); }
    .stat-card.amber { border-left:3px solid var(--warning); }
    .stat-card.red   { border-left:3px solid var(--danger); }
    .stat-value { font-family:var(--font-display); font-size:1.5rem; font-weight:700; color:var(--gray-900); line-height:1; margin-bottom:.25rem; }
    .stat-label { font-size:.72rem; font-weight:500; color:var(--gray-400); text-transform:uppercase; letter-spacing:.05em; }

    .quick-actions { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1rem; }
    .qa-btn { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:1rem .875rem; display:flex; flex-direction:column; align-items:flex-start; gap:.5rem; cursor:pointer; transition:box-shadow .15s,border-color .15s; text-decoration:none; }
    .qa-btn:hover { border-color:var(--brand); box-shadow:0 4px 12px rgba(0,0,0,.1); }
    .qa-icon { width:36px; height:36px; border-radius:var(--r-sm); display:grid; place-items:center; }
    .qa-icon.blue  { background:var(--brand-light); color:var(--brand); }
    .qa-icon.green { background:var(--success-bg);  color:var(--success); }
    .qa-icon.amber { background:var(--warning-bg);  color:var(--warning); }
    .qa-icon.red   { background:var(--danger-bg);   color:var(--danger); }
    .qa-label { font-size:.8rem; font-weight:600; color:var(--gray-700); line-height:1.3; }

    .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.875rem; margin-top:1.5rem; }
    .section-head:first-child { margin-top:0; }
    .section-title { font-family:var(--font-display); font-size:.95rem; font-weight:700; color:var(--gray-700); }

    .card { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; box-shadow:var(--shadow-sm); }
    .list-row { display:flex; align-items:center; gap:.875rem; padding:.875rem 0; border-bottom:1px solid var(--border); }
    .list-row:last-child { border-bottom:none; }
    .list-avatar { width:42px; height:42px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.9rem; flex-shrink:0; }
    .list-name { font-weight:600; font-size:.9rem; color:var(--gray-800); }
    .list-sub  { font-size:.78rem; color:var(--gray-400); margin-top:.1rem; }
    .list-right { margin-left:auto; text-align:right; }

    .badge { display:inline-flex; align-items:center; padding:.25rem .6rem; border-radius:var(--r-full); font-size:.7rem; font-weight:600; white-space:nowrap; }
    .badge-green { background:var(--success-bg); color:#065f46; }
    .badge-amber { background:var(--warning-bg); color:#92400e; }
    .badge-red   { background:var(--danger-bg);  color:#991b1b; }
    .badge-blue  { background:var(--brand-light); color:var(--brand-dark); }
    .badge-gray  { background:var(--gray-100);   color:var(--gray-600); }

    .pending-item { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:.875rem 1rem; margin-bottom:.625rem; display:flex; align-items:center; gap:.875rem; }
    .pending-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .pending-dot.amber { background:var(--warning); }
    .pending-dot.red   { background:var(--danger); }

    .empty-state { text-align:center; padding:2rem 1rem; color:var(--gray-400); }
    .empty-state p { font-size:.9rem; }

    .skeleton { background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { to { background-position:-200% 0; } }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; transition:color .15s; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }

    #toast-container { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:999; width:calc(100% - 2rem); max-width:420px; pointer-events:none; }
    .toast { background:var(--gray-900); color:#fff; padding:.75rem 1rem; border-radius:var(--r-md); font-size:.85rem; font-weight:500; margin-bottom:.5rem; animation:toast-in .2s ease; }
    .toast.success { background:#065f46; }
    .toast.error   { background:#991b1b; }
    @keyframes toast-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <div class="top-bar-avatar" id="avatarBtn"></div>
</header>

<main class="page-content">
  <div class="greeting">
    <div class="greeting-name" id="greetName">Loading…</div>
    <div class="greeting-role">Relationship Officer</div>
  </div>

  <div class="stat-grid">
    <div class="stat-card brand"><div class="stat-value" id="statDrivers">—</div><div class="stat-label">My Drivers</div></div>
    <div class="stat-card amber"><div class="stat-value" id="statLeads">—</div><div class="stat-label">Active Leads</div></div>
    <div class="stat-card red"><div class="stat-value" id="statChecks">—</div><div class="stat-label">Pending Checks</div></div>
    <div class="stat-card green"><div class="stat-value" id="statPayments">—</div><div class="stat-label">Payments Today</div></div>
  </div>

  <div class="section-head" style="margin-top:0"><span class="section-title">Quick Actions</span></div>
  <div class="quick-actions">
    <a href="/pages/officer/create-lead.html" class="qa-btn">
      <div class="qa-icon blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg></div>
      <span class="qa-label">Create Lead</span>
    </a>
    <a href="/pages/officer/drivers.html" class="qa-btn">
      <div class="qa-icon green"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      <span class="qa-label">My Drivers</span>
    </a>
    <a href="/pages/officer/record-payment.html" class="qa-btn">
      <div class="qa-icon amber"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
      <span class="qa-label">Record Payment</span>
    </a>
    <a href="/pages/officer/checks.html" class="qa-btn">
      <div class="qa-icon red"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
      <span class="qa-label">Pre-Use Checks</span>
    </a>
  </div>

  <div class="section-head"><span class="section-title">My Drivers</span><a href="/pages/officer/drivers.html" style="font-size:.8rem;color:var(--brand)">View all</a></div>
  <div class="card" id="driverList"><div style="padding:.5rem 0"><div class="skeleton" style="height:14px;width:60%;margin-bottom:.75rem"></div><div class="skeleton" style="height:14px;width:40%"></div></div></div>

  <div class="section-head"><span class="section-title">Pending Pre-Use Checks</span><a href="/pages/officer/checks.html" style="font-size:.8rem;color:var(--brand)">View all</a></div>
  <div id="checkList"><div class="skeleton" style="height:64px;border-radius:12px;margin-bottom:.625rem"></div></div>
</main>

<nav class="bottom-nav">
  <a href="/pages/officer/dashboard.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a href="/pages/officer/drivers.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Drivers
  </a>
  <a href="/pages/officer/create-lead.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    New Lead
  </a>
  <a href="/pages/officer/checks.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Checks
  </a>
  <a href="/pages/officer/fleet.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>
    Fleet
  </a>
</nav>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href = '/index.html'; return; }

    const { data: profile } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!profile || !['relationship_officer','super_admin'].includes(profile.role)) { window.location.href = '/index.html'; return; }

    const hour = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greetName').textContent = greet + ', ' + profile.full_name.split(' ')[0] + ' 👋';

    const ini = profile.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    av.textContent = ini;
    av.addEventListener('click', async () => { if(confirm('Sign out?')) { await db.auth.signOut(); window.location.href='/index.html'; } });

    // Get my driver IDs
    const { data: assignments } = await db.from('officer_driver_assignments').select('driver_id').eq('officer_id', profile.id).eq('is_active', true);
    const driverIds = (assignments || []).map(a => a.driver_id);

    // Stats
    const today = new Date().toISOString().split('T')[0];
    const [leadsRes, checksRes, paymentsRes] = await Promise.all([
      db.from('leads').select('id', { count:'exact', head:true }).eq('created_by', profile.id).not('status', 'in', '("approved","rejected")'),
      driverIds.length ? db.from('pre_use_checks').select('id', { count:'exact', head:true }).in('driver_id', driverIds).eq('status','pending') : { count: 0 },
      driverIds.length ? db.from('payments').select('id', { count:'exact', head:true }).in('driver_id', driverIds).eq('paid_at', today) : { count: 0 },
    ]);

    document.getElementById('statDrivers').textContent  = driverIds.length;
    document.getElementById('statLeads').textContent    = leadsRes.count ?? 0;
    document.getElementById('statChecks').textContent   = checksRes.count ?? 0;
    document.getElementById('statPayments').textContent = paymentsRes.count ?? 0;

    // Drivers list
    const driverList = document.getElementById('driverList');
    if (!driverIds.length) {
      driverList.innerHTML = `<div class="empty-state"><p>No drivers assigned yet.</p></div>`;
    } else {
      const { data: drivers } = await db.from('profiles').select('id, full_name, email, phone').in('id', driverIds).limit(4);
      driverList.innerHTML = (drivers || []).map(d => {
        const ini = d.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
        return `<div class="list-row">
          <div class="list-avatar">${ini}</div>
          <div><div class="list-name">${d.full_name}</div><div class="list-sub">${d.phone || d.email}</div></div>
          <div class="list-right"><a href="/pages/officer/driver-detail.html?id=${d.id}" style="font-size:.78rem;color:var(--brand);font-weight:600">View →</a></div>
        </div>`;
      }).join('');
    }

    // Pending checks
    const checkList = document.getElementById('checkList');
    if (!driverIds.length) {
      checkList.innerHTML = `<div class="empty-state"><p>No pending checks.</p></div>`;
    } else {
      const { data: checks } = await db.from('pre_use_checks').select('id, check_date, driver_id, profiles(full_name)').in('driver_id', driverIds).eq('status','pending').order('submitted_at', { ascending:false }).limit(3);
      if (!checks || !checks.length) {
        checkList.innerHTML = `<div class="empty-state"><p>No pending checks. ✅</p></div>`;
      } else {
        checkList.innerHTML = checks.map(c => `
          <div class="pending-item">
            <div class="pending-dot amber"></div>
            <div style="flex:1"><div style="font-weight:600;font-size:.88rem">${c.profiles?.full_name || 'Driver'}</div><div style="font-size:.75rem;color:var(--gray-400)">Check for ${c.check_date}</div></div>
            <a href="/pages/officer/checks.html" class="badge badge-amber">Review</a>
          </div>`).join('');
      }
    }
  }

  init();
</script>
</body>
</html>
