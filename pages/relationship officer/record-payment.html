<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — Record Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3; --warning:#f59e0b; --warning-bg:#fffbeb;
      --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-300:#d1d5db;
      --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563; --gray-700:#374151;
      --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); }
    .top-bar-title { font-weight:600; font-size:1rem; color:var(--gray-800); flex:1; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    .driver-select-card { background:#fff; border:1.5px solid var(--border); border-radius:var(--r-md); padding:.875rem 1rem; display:flex; align-items:center; gap:.875rem; cursor:pointer; margin-bottom:.625rem; transition:border-color .15s; }
    .driver-select-card.selected { border-color:var(--brand); background:var(--brand-light); }
    .driver-avatar { width:40px; height:40px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.85rem; flex-shrink:0; }
    .driver-select-card.selected .driver-avatar { background:var(--brand); color:#fff; }

    .radio-circle { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); display:grid; place-items:center; flex-shrink:0; transition:all .15s; margin-left:auto; }
    .driver-select-card.selected .radio-circle { border-color:var(--brand); background:var(--brand); }
    .radio-dot { width:8px; height:8px; border-radius:50%; background:#fff; display:none; }
    .driver-select-card.selected .radio-dot { display:block; }

    .card { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; }
    .section-div { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gray-400); margin:1.25rem 0 .875rem; display:flex; align-items:center; gap:.75rem; }
    .section-div::after { content:''; flex:1; height:1px; background:var(--border); }
    .form-group { margin-bottom:1rem; }
    .form-label { display:block; font-size:.75rem; font-weight:600; color:var(--gray-600); letter-spacing:.05em; text-transform:uppercase; margin-bottom:.4rem; }
    .form-input, .form-select, .form-textarea { width:100%; background:var(--gray-50); border:1.5px solid var(--border); border-radius:var(--r-sm); color:var(--gray-800); font-family:var(--font-body); font-size:.9rem; padding:.7rem .875rem; outline:none; transition:border-color .15s; appearance:none; }
    .form-input:focus, .form-select:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(26,86,219,.12); background:#fff; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }

    .weekly-hint { background:var(--brand-light); border-radius:var(--r-sm); padding:.625rem .875rem; font-size:.82rem; color:var(--brand-dark); margin-bottom:1rem; display:none; }
    .weekly-hint.show { display:block; }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.75rem 1.25rem; border:none; border-radius:var(--r-sm); font-family:var(--font-body); font-size:.9rem; font-weight:600; cursor:pointer; transition:opacity .15s,transform .1s; }
    .btn:active { transform:scale(.97); }
    .btn:disabled { opacity:.5; pointer-events:none; }
    .btn-primary { background:var(--brand); color:#fff; }
    .btn-ghost   { background:transparent; color:var(--gray-600); }
    .btn-full { width:100%; }

    .spinner { width:18px; height:18px; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .65s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .error-box { margin-top:.875rem; padding:.75rem; background:var(--danger-bg); border:1px solid #fca5a5; border-radius:var(--r-sm); font-size:.82rem; color:#991b1b; display:none; }
    .error-box.show { display:block; }

    .success-banner { display:none; background:var(--success-bg); border:1px solid #a7f3d0; border-radius:var(--r-md); padding:1.25rem; text-align:center; margin-bottom:1rem; }
    .success-banner.show { display:block; }

    .recent-payment { display:flex; justify-content:space-between; align-items:center; padding:.625rem 0; border-bottom:1px solid var(--gray-100); font-size:.83rem; }
    .recent-payment:last-child { border-bottom:none; }

    .badge { display:inline-flex; padding:.2rem .5rem; border-radius:var(--r-full); font-size:.68rem; font-weight:600; }
    .badge-green { background:var(--success-bg); color:#065f46; }
    .badge-amber { background:var(--warning-bg); color:#92400e; }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; transition:color .15s; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }

    #toast-container { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:999; width:calc(100% - 2rem); max-width:420px; pointer-events:none; }
    .toast { background:var(--gray-900); color:#fff; padding:.75rem 1rem; border-radius:var(--r-md); font-size:.85rem; font-weight:500; margin-bottom:.5rem; animation:toast-in .2s ease; }
    .toast.success { background:#065f46; }
    .toast.error   { background:#991b1b; }
    @keyframes toast-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <span class="top-bar-title">Record Payment</span>
  <div class="top-bar-avatar" id="avatarBtn"></div>
</header>

<main class="page-content">

  <!-- Success -->
  <div class="success-banner" id="successBanner">
    <div style="font-size:2rem;margin-bottom:.5rem">✅</div>
    <div style="font-family:var(--font-display);font-weight:700;font-size:1rem;margin-bottom:.25rem" id="successMsg"></div>
    <p style="font-size:.82rem;color:#065f46">Payment recorded successfully.</p>
    <button class="btn btn-primary" style="margin-top:1rem;width:100%" onclick="resetForm()">Record Another</button>
  </div>

  <div id="formWrap">
    <!-- Driver selector -->
    <div style="font-family:var(--font-display);font-weight:700;font-size:.95rem;color:var(--gray-700);margin-bottom:.875rem">Select Driver</div>
    <div id="driverSelector"><div style="height:56px;background:var(--gray-100);border-radius:12px;animation:shimmer 1.4s infinite"></div></div>

    <!-- Payment form -->
    <div id="paymentForm" style="display:none;margin-top:1.25rem">
      <div class="weekly-hint" id="weeklyHint"></div>
      <div class="card">
        <div class="section-div">Payment Details</div>
        <div class="form-group">
          <label class="form-label">Amount (GHS) *</label>
          <input class="form-input" id="amount" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Week Starting *</label>
            <input class="form-input" id="weekStarting" type="date"/>
          </div>
          <div class="form-group">
            <label class="form-label">Method</label>
            <select class="form-select" id="method">
              <option value="cash">Cash</option>
              <option value="mobile_money">Mobile Money</option>
              <option value="bank_transfer">Bank Transfer</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Reference / Receipt No.</label>
          <input class="form-input" id="reference" type="text" placeholder="Optional"/>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <input class="form-input" id="notes" type="text" placeholder="Optional"/>
        </div>
      </div>

      <div class="error-box" id="errBox"></div>

      <button class="btn btn-primary btn-full" style="margin-top:1rem" id="submitBtn" onclick="submitPayment()">
        <span id="submitLabel">Record Payment</span>
        <div class="spinner" id="submitSpinner" style="display:none"></div>
      </button>

      <!-- Recent payments for selected driver -->
      <div style="margin-top:1.5rem">
        <div style="font-family:var(--font-display);font-weight:700;font-size:.9rem;color:var(--gray-700);margin-bottom:.75rem">Recent Payments</div>
        <div class="card" id="recentPayments" style="padding:.5rem 1rem"></div>
      </div>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="/pages/officer/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
  <a href="/pages/officer/drivers.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Drivers</a>
  <a href="/pages/officer/create-lead.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>New Lead</a>
  <a href="/pages/officer/checks.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Checks</a>
  <a href="/pages/officer/fleet.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>Fleet</a>
</nav>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let officerProfile = null, drivers = [], selectedDriver = null, selectedAssignment = null;

  function toast(msg, type='default') { const c=document.getElementById('toast-container'); const el=document.createElement('div'); el.className='toast '+type; el.textContent=msg; c.appendChild(el); setTimeout(()=>el.remove(),3000); }

  async function selectDriver(d) {
    selectedDriver = d;
    document.querySelectorAll('.driver-select-card').forEach(el => el.classList.toggle('selected', el.dataset.id === d.id));

    // Get active assignment
    const { data: asgn } = await db.from('driver_assignments').select('*, cars(make,model,plate_number)').eq('driver_id', d.id).eq('is_active', true).single();
    selectedAssignment = asgn;

    if (asgn) {
      const hint = document.getElementById('weeklyHint');
      hint.textContent = `Weekly rate: GHS ${asgn.weekly_payment} · ${asgn.cars?.make} ${asgn.cars?.model} (${asgn.cars?.plate_number})`;
      hint.classList.add('show');
      document.getElementById('amount').value = asgn.weekly_payment;
    }

    // Set week starting to current Monday
    const today = new Date();
    const day = today.getDay();
    const diff = today.getDate() - day + (day === 0 ? -6 : 1);
    const monday = new Date(today.setDate(diff));
    document.getElementById('weekStarting').value = monday.toISOString().split('T')[0];

    document.getElementById('paymentForm').style.display = '';
    loadRecentPayments(d.id);
  }

  async function loadRecentPayments(driverId) {
    const { data } = await db.from('payments').select('amount, week_starting, status, payment_method, paid_at').eq('driver_id', driverId).order('created_at', { ascending: false }).limit(5);
    const el = document.getElementById('recentPayments');
    if (!data || !data.length) { el.innerHTML = '<div style="font-size:.82rem;color:var(--gray-400);padding:.5rem 0;text-align:center">No payments yet</div>'; return; }
    el.innerHTML = data.map(p => `
      <div class="recent-payment">
        <div>
          <div style="font-weight:600;font-size:.85rem">GHS ${parseFloat(p.amount).toFixed(2)}</div>
          <div style="font-size:.72rem;color:var(--gray-400)">Week of ${p.week_starting} · ${p.payment_method || 'cash'}</div>
        </div>
        <span class="badge ${p.status==='paid'?'badge-green':'badge-amber'}">${p.status}</span>
      </div>`).join('');
  }

  window.submitPayment = async () => {
    const errEl = document.getElementById('errBox');
    errEl.classList.remove('show');
    if (!selectedDriver) { errEl.textContent='Please select a driver.'; errEl.classList.add('show'); return; }
    const amount = parseFloat(document.getElementById('amount').value);
    const weekStarting = document.getElementById('weekStarting').value;
    if (!amount || amount <= 0) { errEl.textContent='Please enter a valid amount.'; errEl.classList.add('show'); return; }
    if (!weekStarting) { errEl.textContent='Please select a week.'; errEl.classList.add('show'); return; }

    const btn = document.getElementById('submitBtn');
    document.getElementById('submitLabel').style.display='none';
    document.getElementById('submitSpinner').style.display='block';
    btn.disabled = true;

    try {
      const { error } = await db.from('payments').insert({
        driver_id: selectedDriver.id,
        assignment_id: selectedAssignment?.id || null,
        amount,
        week_starting: weekStarting,
        status: 'paid',
        paid_at: new Date().toISOString(),
        recorded_by: officerProfile.id,
        payment_method: document.getElementById('method').value,
        reference: document.getElementById('reference').value.trim() || null,
        notes: document.getElementById('notes').value.trim() || null,
      });
      if (error) throw error;

      document.getElementById('formWrap').style.display='none';
      document.getElementById('successMsg').textContent = `GHS ${amount.toFixed(2)} from ${selectedDriver.full_name}`;
      document.getElementById('successBanner').classList.add('show');
    } catch(e) {
      errEl.textContent = e.message || 'Failed to record payment.';
      errEl.classList.add('show');
    } finally {
      document.getElementById('submitLabel').style.display='';
      document.getElementById('submitSpinner').style.display='none';
      btn.disabled = false;
    }
  };

  window.resetForm = () => {
    selectedDriver = null; selectedAssignment = null;
    document.getElementById('successBanner').classList.remove('show');
    document.getElementById('formWrap').style.display='';
    document.getElementById('paymentForm').style.display='none';
    document.getElementById('weeklyHint').classList.remove('show');
    document.querySelectorAll('.driver-select-card').forEach(el => el.classList.remove('selected'));
  };

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href='/index.html'; return; }
    const { data: p } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!p || !['relationship_officer','super_admin'].includes(p.role)) { window.location.href='/index.html'; return; }
    officerProfile = p;

    const ini = p.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    av.textContent = ini;
    av.addEventListener('click', async () => { if(confirm('Sign out?')) { await db.auth.signOut(); window.location.href='/index.html'; } });

    const { data: asgns } = await db.from('officer_driver_assignments').select('driver_id').eq('officer_id', p.id).eq('is_active', true);
    const ids = (asgns||[]).map(a=>a.driver_id);
    if (!ids.length) { document.getElementById('driverSelector').innerHTML='<div style="font-size:.85rem;color:var(--gray-400);padding:.5rem">No drivers assigned yet.</div>'; return; }

    const { data: drv } = await db.from('profiles').select('id, full_name, phone').in('id', ids).order('full_name');
    drivers = drv || [];

    const sel = document.getElementById('driverSelector');
    sel.innerHTML = drivers.map(d => {
      const ini = d.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
      return `<div class="driver-select-card" data-id="${d.id}" onclick='selectDriver(${JSON.stringify(d)})'>
        <div class="driver-avatar">${ini}</div>
        <div><div style="font-weight:600;font-size:.88rem">${d.full_name}</div><div style="font-size:.75rem;color:var(--gray-400)">${d.phone||'—'}</div></div>
        <div class="radio-circle"><div class="radio-dot"></div></div>
      </div>`;
    }).join('');

    // Pre-select from URL param
    const params = new URLSearchParams(location.search);
    const preDriver = params.get('driver');
    if (preDriver) { const d = drivers.find(x=>x.id===preDriver); if(d) selectDriver(d); }
  }
  init();
</script>
</body>
</html>
