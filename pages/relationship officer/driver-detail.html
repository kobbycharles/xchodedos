<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — Driver Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3; --warning:#f59e0b; --warning-bg:#fffbeb;
      --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-300:#d1d5db;
      --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563; --gray-700:#374151;
      --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); }
    .top-bar-title { font-weight:600; font-size:1rem; flex:1; color:var(--gray-800); }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; }
    .back-btn { display:inline-flex; align-items:center; gap:.3rem; color:var(--gray-500); font-size:.85rem; font-weight:500; background:none; border:none; padding:0; cursor:pointer; }
    .back-btn:hover { color:var(--brand); }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    /* Profile hero */
    .driver-hero { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.5rem; margin-bottom:1rem; text-align:center; box-shadow:var(--shadow-sm); }
    .hero-avatar { width:72px; height:72px; border-radius:50%; background:var(--brand); color:#fff; display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:1.5rem; margin:0 auto 1rem; }
    .hero-name { font-family:var(--font-display); font-weight:700; font-size:1.2rem; color:var(--gray-900); margin-bottom:.25rem; }
    .hero-sub  { font-size:.82rem; color:var(--gray-400); }
    .hero-actions { display:flex; gap:.75rem; margin-top:1.25rem; justify-content:center; }

    /* Detail rows */
    .detail-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1rem 1.25rem; margin-bottom:1rem; box-shadow:var(--shadow-sm); }
    .detail-card-title { font-family:var(--font-display); font-size:.82rem; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.875rem; }
    .detail-row { display:flex; justify-content:space-between; align-items:flex-start; padding:.55rem 0; border-bottom:1px solid var(--gray-100); font-size:.85rem; gap:1rem; }
    .detail-row:last-child { border-bottom:none; }
    .detail-key { color:var(--gray-400); font-weight:500; flex-shrink:0; }
    .detail-val { color:var(--gray-800); font-weight:600; text-align:right; }

    /* Car card */
    .car-assigned { background:var(--brand-light); border:1px solid rgba(26,86,219,.2); border-radius:var(--r-md); padding:1rem; display:flex; align-items:center; gap:.875rem; margin-bottom:1rem; }
    .car-icon { width:40px; height:40px; border-radius:var(--r-sm); background:var(--brand); color:#fff; display:grid; place-items:center; flex-shrink:0; }
    .car-name { font-weight:700; font-size:.92rem; color:var(--gray-900); }
    .car-sub  { font-size:.75rem; color:var(--gray-500); margin-top:.15rem; }

    /* Payment list */
    .payment-row { display:flex; justify-content:space-between; align-items:center; padding:.75rem 0; border-bottom:1px solid var(--gray-100); font-size:.85rem; }
    .payment-row:last-child { border-bottom:none; }
    .payment-amount { font-weight:700; color:var(--gray-900); }
    .payment-meta   { font-size:.75rem; color:var(--gray-400); margin-top:.1rem; }

    .badge { display:inline-flex; padding:.2rem .55rem; border-radius:var(--r-full); font-size:.68rem; font-weight:600; }
    .badge-green { background:var(--success-bg); color:#065f46; }
    .badge-amber { background:var(--warning-bg); color:#92400e; }
    .badge-red   { background:var(--danger-bg);  color:#991b1b; }
    .badge-blue  { background:var(--brand-light); color:var(--brand-dark); }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.4rem; padding:.55rem .875rem; border:none; border-radius:var(--r-sm); font-family:var(--font-body); font-size:.78rem; font-weight:600; cursor:pointer; text-decoration:none; }
    .btn-primary { background:var(--brand); color:#fff; }
    .btn-outline { background:transparent; color:var(--brand); border:1.5px solid var(--brand); }
    .btn-ghost   { background:transparent; color:var(--gray-600); border:1.5px solid var(--border); }

    .empty-state { text-align:center; padding:1.5rem 1rem; color:var(--gray-400); font-size:.85rem; }
    .skeleton { background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { to { background-position:-200% 0; } }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; transition:color .15s; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }

    #toast-container { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:999; width:calc(100% - 2rem); max-width:420px; pointer-events:none; }
    .toast { background:var(--gray-900); color:#fff; padding:.75rem 1rem; border-radius:var(--r-md); font-size:.85rem; font-weight:500; margin-bottom:.5rem; animation:toast-in .2s ease; }
    .toast.success { background:#065f46; }
    .toast.error   { background:#991b1b; }
    @keyframes toast-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <span class="top-bar-title" id="pageTitle">Driver</span>
  <div class="top-bar-avatar" id="avatarBtn"></div>
</header>

<main class="page-content">
  <button class="back-btn" onclick="history.back()" style="margin-bottom:1rem">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>

  <!-- Hero -->
  <div class="driver-hero" id="driverHero">
    <div class="skeleton" style="width:72px;height:72px;border-radius:50%;margin:0 auto 1rem"></div>
    <div class="skeleton" style="height:18px;width:55%;margin:0 auto .5rem"></div>
    <div class="skeleton" style="height:13px;width:35%;margin:0 auto"></div>
  </div>

  <!-- Car -->
  <div id="carSection"></div>

  <!-- Personal details -->
  <div class="detail-card" id="personalCard">
    <div class="detail-card-title">Personal Details</div>
    <div class="skeleton" style="height:14px;margin-bottom:.75rem"></div>
    <div class="skeleton" style="height:14px;width:70%"></div>
  </div>

  <!-- Payment history -->
  <div class="detail-card" id="paymentsCard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">
      <div class="detail-card-title" style="margin-bottom:0">Payment History</div>
      <a id="recordPayLink" href="#" class="btn btn-primary" style="font-size:.72rem;padding:.35rem .75rem">+ Record</a>
    </div>
    <div id="paymentList"><div class="skeleton" style="height:14px;margin-bottom:.75rem"></div></div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="/pages/officer/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
  <a href="/pages/officer/drivers.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Drivers</a>
  <a href="/pages/officer/create-lead.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>New Lead</a>
  <a href="/pages/officer/checks.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Checks</a>
  <a href="/pages/officer/fleet.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>Fleet</a>
</nav>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href='/index.html'; return; }
    const { data: me } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!me || !['relationship_officer','super_admin'].includes(me.role)) { window.location.href='/index.html'; return; }

    const ini = me.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    av.textContent = ini;
    av.addEventListener('click', async () => { if(confirm('Sign out?')) { await db.auth.signOut(); window.location.href='/index.html'; } });

    // Get driver ID from URL
    const params = new URLSearchParams(location.search);
    const driverId = params.get('id');
    if (!driverId) { window.location.href='/pages/officer/drivers.html'; return; }

    // Load driver profile
    const { data: driver } = await db.from('profiles').select('*').eq('id', driverId).single();
    if (!driver) { window.location.href='/pages/officer/drivers.html'; return; }

    document.getElementById('pageTitle').textContent = driver.full_name.split(' ')[0];
    document.getElementById('recordPayLink').href = `/pages/officer/record-payment.html?driver=${driverId}`;

    // Hero
    const dIni = driver.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const joinDate = new Date(driver.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    document.getElementById('driverHero').innerHTML = `
      <div class="hero-avatar">${dIni}</div>
      <div class="hero-name">${driver.full_name}</div>
      <div class="hero-sub">${driver.phone || driver.email || '—'}</div>
      <div class="hero-sub" style="margin-top:.25rem">Driver since ${joinDate}</div>
      <div class="hero-actions">
        <a href="/pages/officer/record-payment.html?driver=${driverId}" class="btn btn-primary">Record Payment</a>
        <a href="tel:${driver.phone||''}" class="btn btn-outline">Call Driver</a>
      </div>`;

    // Car assignment
    const { data: assignment } = await db.from('driver_assignments').select('*, cars(*)').eq('driver_id', driverId).eq('is_active', true).single();
    const carSection = document.getElementById('carSection');
    if (assignment?.cars) {
      const c = assignment.cars;
      carSection.innerHTML = `
        <div class="car-assigned" style="margin-bottom:1rem">
          <div class="car-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg></div>
          <div style="flex:1">
            <div class="car-name">${c.make} ${c.model} ${c.year}</div>
            <div class="car-sub">${c.plate_number}${c.color?' · '+c.color:''} · GHS ${assignment.weekly_payment}/wk</div>
          </div>
          <span class="badge badge-green">Assigned</span>
        </div>`;
    } else {
      carSection.innerHTML = `<div style="background:var(--warning-bg);border-radius:12px;padding:.875rem 1rem;margin-bottom:1rem;font-size:.85rem;color:#92400e">⚠️ No vehicle currently assigned to this driver.</div>`;
    }

    // Personal details
    document.getElementById('personalCard').innerHTML = `
      <div class="detail-card-title">Personal Details</div>
      <div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val">${driver.phone||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Email</span><span class="detail-val">${driver.email||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">ID Number</span><span class="detail-val">${driver.id_number||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Address</span><span class="detail-val">${driver.address||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Emergency</span><span class="detail-val">${driver.emergency_contact||'—'}${driver.emergency_phone?' · '+driver.emergency_phone:''}</span></div>`;

    // Payment history
    const { data: payments } = await db.from('payments').select('*').eq('driver_id', driverId).order('created_at', { ascending:false }).limit(10);
    const payList = document.getElementById('paymentList');
    if (!payments || !payments.length) {
      payList.innerHTML = `<div class="empty-state">No payments recorded yet.</div>`;
    } else {
      const total = payments.reduce((s,p) => s + parseFloat(p.amount), 0);
      payList.innerHTML = `
        <div style="background:var(--success-bg);border-radius:8px;padding:.75rem;margin-bottom:.875rem;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:.78rem;font-weight:600;color:#065f46">Total Paid</span>
          <span style="font-family:var(--font-display);font-weight:700;color:#065f46">GHS ${total.toFixed(2)}</span>
        </div>
        ${payments.map(p => `<div class="payment-row">
          <div>
            <div class="payment-amount">GHS ${parseFloat(p.amount).toFixed(2)}</div>
            <div class="payment-meta">Week of ${p.week_starting} · ${p.payment_method||'cash'}</div>
          </div>
          <span class="badge ${p.status==='paid'?'badge-green':'badge-amber'}">${p.status}</span>
        </div>`).join('')}`;
    }
  }

  init();
</script>
</body>
</html>
