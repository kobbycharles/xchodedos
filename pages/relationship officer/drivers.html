<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — My Drivers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3; --warning:#f59e0b; --warning-bg:#fffbeb;
      --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-300:#d1d5db;
      --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563; --gray-700:#374151;
      --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --surface:#fff; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); }
    .top-bar-title { font-weight:600; font-size:1rem; color:var(--gray-800); flex:1; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    .search-bar { position:relative; margin-bottom:.875rem; }
    .search-bar svg { position:absolute; left:.875rem; top:50%; transform:translateY(-50%); color:var(--gray-400); pointer-events:none; }
    .search-bar input { width:100%; background:#fff; border:1.5px solid var(--border); border-radius:var(--r-sm); color:var(--gray-800); font-family:var(--font-body); font-size:.9rem; padding:.7rem .875rem .7rem 2.6rem; outline:none; }
    .search-bar input:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(26,86,219,.12); }

    .driver-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:1rem; margin-bottom:.75rem; box-shadow:var(--shadow-sm); }
    .driver-header { display:flex; align-items:center; gap:.875rem; margin-bottom:.875rem; }
    .driver-avatar { width:48px; height:48px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:1rem; flex-shrink:0; }
    .driver-name { font-family:var(--font-display); font-weight:700; font-size:.95rem; color:var(--gray-900); }
    .driver-sub  { font-size:.75rem; color:var(--gray-400); margin-top:.15rem; }
    .driver-car  { background:var(--gray-50); border-radius:var(--r-sm); padding:.625rem .875rem; display:flex; align-items:center; gap:.75rem; margin-bottom:.875rem; font-size:.82rem; }
    .driver-car svg { color:var(--gray-400); flex-shrink:0; }
    .driver-car-info { flex:1; }
    .driver-car-name { font-weight:600; color:var(--gray-800); }
    .driver-car-plate { color:var(--gray-400); font-size:.75rem; }
    .driver-actions { display:flex; gap:.5rem; }

    .badge { display:inline-flex; align-items:center; padding:.25rem .6rem; border-radius:var(--r-full); font-size:.7rem; font-weight:600; white-space:nowrap; }
    .badge-green { background:var(--success-bg); color:#065f46; }
    .badge-amber { background:var(--warning-bg); color:#92400e; }
    .badge-gray  { background:var(--gray-100);   color:var(--gray-600); }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.5rem .875rem; border:none; border-radius:var(--r-sm); font-family:var(--font-body); font-size:.78rem; font-weight:600; cursor:pointer; transition:opacity .15s; text-decoration:none; }
    .btn-outline { background:transparent; color:var(--brand); border:1.5px solid var(--brand); }
    .btn-ghost   { background:transparent; color:var(--gray-600); border:1.5px solid var(--border); }

    .empty-state { text-align:center; padding:3rem 1rem; color:var(--gray-400); }
    .empty-state p { font-size:.9rem; }

    .skeleton { background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { to { background-position:-200% 0; } }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; transition:color .15s; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }
  </style>
</head>
<body>
<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <span class="top-bar-title">My Drivers</span>
  <div class="top-bar-avatar" id="avatarBtn"></div>
</header>

<main class="page-content">
  <div class="search-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="searchInput" placeholder="Search drivers…" oninput="render()"/>
  </div>
  <div id="driverList"><div class="skeleton" style="height:120px;border-radius:12px;margin-bottom:.75rem"></div><div class="skeleton" style="height:120px;border-radius:12px"></div></div>
</main>

<nav class="bottom-nav">
  <a href="/pages/officer/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
  <a href="/pages/officer/drivers.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Drivers</a>
  <a href="/pages/officer/create-lead.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>New Lead</a>
  <a href="/pages/officer/checks.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Checks</a>
  <a href="/pages/officer/fleet.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>Fleet</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let allDrivers = [];

  window.render = () => {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const list = document.getElementById('driverList');
    const filtered = allDrivers.filter(d => d.full_name.toLowerCase().includes(q) || (d.phone||'').includes(q));
    if (!filtered.length) { list.innerHTML = `<div class="empty-state"><p>No drivers found.</p></div>`; return; }
    list.innerHTML = filtered.map(d => {
      const ini = d.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
      const car = d.driver_assignments?.[0];
      const carInfo = car ? `${car.cars?.make || ''} ${car.cars?.model || ''} · ${car.cars?.plate_number || ''}` : null;
      return `<div class="driver-card">
        <div class="driver-header">
          <div class="driver-avatar">${ini}</div>
          <div style="flex:1">
            <div class="driver-name">${d.full_name}</div>
            <div class="driver-sub">${d.phone || d.email || '—'}</div>
          </div>
          <span class="badge ${carInfo ? 'badge-green' : 'badge-amber'}">${carInfo ? 'Assigned' : 'No Car'}</span>
        </div>
        ${carInfo ? `<div class="driver-car"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg><div class="driver-car-info"><div class="driver-car-name">${car.cars?.make} ${car.cars?.model} ${car.cars?.year}</div><div class="driver-car-plate">${car.cars?.plate_number} · GHS ${car.weekly_payment}/wk</div></div></div>` : ''}
        <div class="driver-actions">
          <a href="/pages/officer/driver-detail.html?id=${d.id}" class="btn btn-outline">View Details</a>
          <a href="/pages/officer/record-payment.html?driver=${d.id}" class="btn btn-ghost">Record Payment</a>
        </div>
      </div>`;
    }).join('');
  };

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href='/index.html'; return; }
    const { data: p } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!p || !['relationship_officer','super_admin'].includes(p.role)) { window.location.href='/index.html'; return; }

    const ini = p.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    av.textContent = ini;
    av.addEventListener('click', async () => { if(confirm('Sign out?')) { await db.auth.signOut(); window.location.href='/index.html'; } });

    const { data: assignments } = await db.from('officer_driver_assignments').select('driver_id').eq('officer_id', p.id).eq('is_active', true);
    const driverIds = (assignments||[]).map(a => a.driver_id);

    if (!driverIds.length) { document.getElementById('driverList').innerHTML = `<div class="empty-state"><p>No drivers assigned to you yet.</p></div>`; return; }

    const { data: drivers } = await db.from('profiles')
      .select('id, full_name, email, phone, driver_assignments(weekly_payment, cars(make, model, year, plate_number))')
      .in('id', driverIds)
      .eq('driver_assignments.is_active', true)
      .order('full_name');

    allDrivers = drivers || [];
    render();
  }
  init();
</script>
</body>
</html>
