<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — My Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3; --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563;
      --gray-700:#374151; --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); }
    .top-bar-title { font-weight:600; font-size:1rem; flex:1; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    .profile-hero { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.75rem 1.5rem; text-align:center; margin-bottom:1rem; box-shadow:var(--shadow-sm); }
    .profile-avatar { width:80px; height:80px; border-radius:50%; background:var(--brand); color:#fff; display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:1.75rem; margin:0 auto 1rem; }
    .profile-name { font-family:var(--font-display); font-weight:700; font-size:1.25rem; color:var(--gray-900); margin-bottom:.25rem; }
    .profile-role { font-size:.8rem; color:var(--gray-400); margin-bottom:.875rem; }
    .profile-badge { display:inline-flex; padding:.3rem .875rem; border-radius:var(--r-full); background:var(--success-bg); color:#065f46; font-size:.78rem; font-weight:600; }

    .detail-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1rem 1.25rem; margin-bottom:1rem; box-shadow:var(--shadow-sm); }
    .detail-card-title { font-family:var(--font-display); font-size:.82rem; font-weight:700; color:var(--gray-500); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.875rem; }
    .detail-row { display:flex; justify-content:space-between; align-items:flex-start; padding:.625rem 0; border-bottom:1px solid var(--gray-100); font-size:.88rem; gap:1rem; }
    .detail-row:last-child { border-bottom:none; }
    .detail-key { color:var(--gray-400); font-weight:500; flex-shrink:0; }
    .detail-val { color:var(--gray-800); font-weight:600; text-align:right; word-break:break-word; }

    /* Settings rows */
    .settings-list { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; margin-bottom:1rem; box-shadow:var(--shadow-sm); }
    .settings-row { display:flex; align-items:center; gap:.875rem; padding:.875rem 1rem; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
    .settings-row:last-child { border-bottom:none; }
    .settings-row:hover { background:var(--gray-50); }
    .settings-row.danger { color:var(--danger); }
    .settings-icon { width:36px; height:36px; border-radius:var(--r-sm); display:grid; place-items:center; flex-shrink:0; }
    .settings-icon.blue  { background:var(--brand-light); color:var(--brand); }
    .settings-icon.red   { background:var(--danger-bg);  color:var(--danger); }
    .settings-icon.gray  { background:var(--gray-100);   color:var(--gray-500); }
    .settings-title { font-size:.9rem; font-weight:600; }
    .settings-sub   { font-size:.75rem; color:var(--gray-400); margin-top:.1rem; }
    .settings-row.danger .settings-title { color:var(--danger); }
    .chev { color:var(--gray-300); margin-left:auto; }

    /* Edit modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:flex-end; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:var(--r-lg) var(--r-lg) 0 0; padding:1.5rem 1.25rem; width:100%; max-width:540px; max-height:85dvh; overflow-y:auto; animation:slide-up .2s ease; }
    @keyframes slide-up { from { transform:translateY(30px); opacity:0; } to { transform:none; opacity:1; } }
    .modal-handle { width:40px; height:4px; background:var(--gray-200); border-radius:2px; margin:0 auto 1.25rem; }
    .modal-title { font-family:var(--font-display); font-weight:700; font-size:1.1rem; margin-bottom:1.25rem; }
    .form-group { margin-bottom:.875rem; }
    .form-label { display:block; font-size:.75rem; font-weight:600; color:var(--gray-600); letter-spacing:.05em; text-transform:uppercase; margin-bottom:.4rem; }
    .form-input, .form-textarea { width:100%; background:var(--gray-50); border:1.5px solid var(--border); border-radius:var(--r-sm); color:var(--gray-800); font-family:var(--font-body); font-size:.9rem; padding:.7rem .875rem; outline:none; }
    .form-input:focus, .form-textarea:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(26,86,219,.12); background:#fff; }
    .form-textarea { resize:vertical; min-height:75px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
    .err-box { padding:.75rem; background:var(--danger-bg); border:1px solid #fca5a5; border-radius:var(--r-sm); font-size:.82rem; color:#991b1b; margin-bottom:.875rem; display:none; }
    .err-box.show { display:block; }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.75rem 1.25rem; border:none; border-radius:var(--r-sm); font-family:var(--font-body); font-size:.9rem; font-weight:600; cursor:pointer; transition:opacity .15s; }
    .btn:disabled { opacity:.5; pointer-events:none; }
    .btn-primary { background:var(--brand); color:#fff; }
    .btn-ghost   { background:transparent; color:var(--gray-600); }
    .btn-full { width:100%; }
    .spinner { width:18px; height:18px; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .65s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .skeleton { background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { to { background-position:-200% 0; } }

    #toast-container { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:999; width:calc(100% - 2rem); max-width:420px; pointer-events:none; }
    .toast { background:var(--gray-900); color:#fff; padding:.75rem 1rem; border-radius:var(--r-md); font-size:.85rem; font-weight:500; margin-bottom:.5rem; animation:toast-in .2s ease; }
    .toast.success { background:#065f46; }
    .toast.error   { background:#991b1b; }
    @keyframes toast-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; transition:color .15s; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }
  </style>
</head>
<body>
<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <span class="top-bar-title">My Profile</span>
  <div class="top-bar-avatar" id="avatarBtn"></div>
</header>

<main class="page-content">

  <!-- Hero -->
  <div class="profile-hero" id="profileHero">
    <div class="skeleton" style="width:80px;height:80px;border-radius:50%;margin:0 auto 1rem"></div>
    <div class="skeleton" style="height:18px;width:55%;margin:0 auto .5rem"></div>
    <div class="skeleton" style="height:13px;width:30%;margin:0 auto"></div>
  </div>

  <!-- Personal info -->
  <div class="detail-card" id="personalCard">
    <div class="detail-card-title">Personal Details</div>
    <div class="skeleton" style="height:14px;margin-bottom:.75rem"></div>
    <div class="skeleton" style="height:14px;width:70%"></div>
  </div>

  <!-- Emergency contact -->
  <div class="detail-card" id="emergencyCard">
    <div class="detail-card-title">Emergency Contact</div>
    <div class="skeleton" style="height:14px;margin-bottom:.75rem"></div>
  </div>

  <!-- Settings -->
  <div class="settings-list">
    <div class="settings-row" onclick="openEditModal()">
      <div class="settings-icon blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
      <div>
        <div class="settings-title">Edit Profile</div>
        <div class="settings-sub">Update phone, address, emergency contact</div>
      </div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="settings-row" onclick="openPwModal()">
      <div class="settings-icon gray"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <div>
        <div class="settings-title">Change Password</div>
        <div class="settings-sub">Update your login password</div>
      </div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="settings-row danger" onclick="handleLogout()">
      <div class="settings-icon red"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
      <div><div class="settings-title">Sign Out</div></div>
    </div>
  </div>

</main>

<!-- Edit Profile Modal -->
<div class="modal-overlay" id="editModal" onclick="closeModal('editModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Profile</div>
    <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="editPhone" type="tel"/></div>
    <div class="form-group"><label class="form-label">Address</label><textarea class="form-textarea" id="editAddress" rows="2"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Emergency Name</label><input class="form-input" id="editEmergName" type="text"/></div>
      <div class="form-group"><label class="form-label">Emergency Phone</label><input class="form-input" id="editEmergPhone" type="tel"/></div>
    </div>
    <div class="err-box" id="editErr"></div>
    <div style="display:flex;gap:.75rem">
      <button class="btn btn-ghost btn-full" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary btn-full" id="saveBtn" onclick="saveProfile()">
        <span id="saveLabel">Save</span>
        <div class="spinner" id="saveSpinner" style="display:none"></div>
      </button>
    </div>
  </div>
</div>

<!-- Change Password Modal -->
<div class="modal-overlay" id="pwModal" onclick="closeModal('pwModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Change Password</div>
    <div class="form-group"><label class="form-label">New Password</label><input class="form-input" id="newPw" type="password" placeholder="Min. 8 characters"/></div>
    <div class="form-group"><label class="form-label">Confirm Password</label><input class="form-input" id="confirmPw" type="password" placeholder="Repeat password"/></div>
    <div class="err-box" id="pwErr"></div>
    <div style="display:flex;gap:.75rem">
      <button class="btn btn-ghost btn-full" onclick="closeModal('pwModal')">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="changePw()">Update Password</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<nav class="bottom-nav">
  <a href="/pages/driver/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
  <a href="/pages/driver/payments.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Payments</a>
  <a href="/pages/driver/pre-use-check.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Check</a>
  <a href="/pages/driver/car.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>Car</a>
  <a href="/pages/driver/profile.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentProfile = null;

  function toast(msg, type='default') {
    const c=document.getElementById('toast-container'); const el=document.createElement('div');
    el.className='toast '+type; el.textContent=msg; c.appendChild(el); setTimeout(()=>el.remove(),3000);
  }

  function renderProfile(p) {
    const ini = p.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const joinDate = new Date(p.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

    document.getElementById('profileHero').innerHTML = `
      <div class="profile-avatar">${ini}</div>
      <div class="profile-name">${p.full_name}</div>
      <div class="profile-role">Driver · Joined ${joinDate}</div>
      <div style="margin-top:.75rem"><span class="profile-badge">Active Driver</span></div>`;

    document.getElementById('personalCard').innerHTML = `
      <div class="detail-card-title">Personal Details</div>
      <div class="detail-row"><span class="detail-key">Full Name</span><span class="detail-val">${p.full_name}</span></div>
      <div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val">${p.phone||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Email</span><span class="detail-val" style="font-size:.82rem">${p.email||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">ID Number</span><span class="detail-val">${p.id_number||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Date of Birth</span><span class="detail-val">${p.date_of_birth ? new Date(p.date_of_birth).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Address</span><span class="detail-val">${p.address||'—'}</span></div>`;

    document.getElementById('emergencyCard').innerHTML = `
      <div class="detail-card-title">Emergency Contact</div>
      <div class="detail-row"><span class="detail-key">Name</span><span class="detail-val">${p.emergency_contact||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val">${p.emergency_phone||'—'}</span></div>`;

    document.getElementById('avatarBtn').textContent = ini;
  }

  window.openEditModal = () => {
    document.getElementById('editPhone').value     = currentProfile.phone||'';
    document.getElementById('editAddress').value   = currentProfile.address||'';
    document.getElementById('editEmergName').value = currentProfile.emergency_contact||'';
    document.getElementById('editEmergPhone').value= currentProfile.emergency_phone||'';
    document.getElementById('editModal').classList.add('open');
  };

  window.closeModal = (id, e) => {
    if (!e || e.target === document.getElementById(id))
      document.getElementById(id).classList.remove('open');
  };

  window.saveProfile = async () => {
    const errEl = document.getElementById('editErr');
    errEl.style.display='none';
    const btn = document.getElementById('saveBtn');
    document.getElementById('saveLabel').style.display='none';
    document.getElementById('saveSpinner').style.display='block';
    btn.disabled=true;

    const updates = {
      phone:             document.getElementById('editPhone').value.trim()||null,
      address:           document.getElementById('editAddress').value.trim()||null,
      emergency_contact: document.getElementById('editEmergName').value.trim()||null,
      emergency_phone:   document.getElementById('editEmergPhone').value.trim()||null,
    };

    const { error } = await db.from('profiles').update(updates).eq('id', currentProfile.id);
    if (error) { errEl.textContent=error.message; errEl.style.display='block'; }
    else {
      currentProfile = { ...currentProfile, ...updates };
      renderProfile(currentProfile);
      toast('Profile updated', 'success');
      document.getElementById('editModal').classList.remove('open');
    }
    document.getElementById('saveLabel').style.display='';
    document.getElementById('saveSpinner').style.display='none';
    btn.disabled=false;
  };

  window.openPwModal = () => {
    document.getElementById('newPw').value='';
    document.getElementById('confirmPw').value='';
    document.getElementById('pwModal').classList.add('open');
  };

  window.changePw = async () => {
    const pw1 = document.getElementById('newPw').value;
    const pw2 = document.getElementById('confirmPw').value;
    const errEl = document.getElementById('pwErr');
    errEl.style.display='none';
    if (pw1.length < 8) { errEl.textContent='Password must be at least 8 characters.'; errEl.style.display='block'; return; }
    if (pw1 !== pw2)    { errEl.textContent='Passwords do not match.'; errEl.style.display='block'; return; }
    const { error } = await db.auth.updateUser({ password: pw1 });
    if (error) { errEl.textContent=error.message; errEl.style.display='block'; return; }
    toast('Password updated', 'success');
    document.getElementById('pwModal').classList.remove('open');
  };

  window.handleLogout = async () => {
    if (confirm('Sign out of xchodedos?')) { await db.auth.signOut(); window.location.href='/index.html'; }
  };

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href='/index.html'; return; }
    const { data: p } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!p || p.role !== 'driver') { window.location.href='/index.html'; return; }
    currentProfile = p;
    renderProfile(p);
    document.getElementById('avatarBtn').addEventListener('click', () => {
      if(confirm('Sign out?')) { db.auth.signOut().then(()=>window.location.href='/index.html'); }
    });
  }
  init();
</script>
</body>
</html>
