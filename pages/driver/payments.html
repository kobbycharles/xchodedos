<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — Payment History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3; --warning:#f59e0b; --warning-bg:#fffbeb;
      --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563;
      --gray-700:#374151; --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); }
    .top-bar-title { font-weight:600; font-size:1rem; flex:1; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    /* Summary cards */
    .summary-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.625rem; margin-bottom:1.25rem; }
    .summary-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:.875rem .75rem; text-align:center; box-shadow:var(--shadow-sm); }
    .summary-val { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--gray-900); line-height:1; margin-bottom:.25rem; }
    .summary-lbl { font-size:.65rem; font-weight:500; color:var(--gray-400); text-transform:uppercase; letter-spacing:.04em; }
    .summary-card.green { border-top:3px solid var(--success); }
    .summary-card.brand { border-top:3px solid var(--brand); }
    .summary-card.amber { border-top:3px solid var(--warning); }

    /* Weekly rate info */
    .rate-banner { background:var(--brand-light); border-radius:var(--r-md); padding:.875rem 1rem; display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; }
    .rate-label { font-size:.8rem; color:var(--brand); font-weight:500; }
    .rate-amount { font-family:var(--font-display); font-weight:700; color:var(--brand-dark); font-size:1rem; }

    /* Month groups */
    .month-group { margin-bottom:1.25rem; }
    .month-header { font-family:var(--font-display); font-size:.82rem; font-weight:700; color:var(--gray-500); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.625rem; padding:.25rem 0; border-bottom:2px solid var(--border); }
    .payment-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); box-shadow:var(--shadow-sm); overflow:hidden; }
    .payment-row { display:flex; align-items:center; gap:.875rem; padding:.875rem 1rem; border-bottom:1px solid var(--gray-100); }
    .payment-row:last-child { border-bottom:none; }
    .payment-icon { width:36px; height:36px; border-radius:var(--r-sm); display:grid; place-items:center; flex-shrink:0; }
    .payment-icon.paid { background:var(--success-bg); color:var(--success); }
    .payment-icon.pending { background:var(--warning-bg); color:var(--warning); }
    .payment-info { flex:1; min-width:0; }
    .payment-amount { font-family:var(--font-display); font-weight:700; font-size:.95rem; color:var(--gray-900); }
    .payment-meta { font-size:.73rem; color:var(--gray-400); margin-top:.1rem; }
    .payment-right { text-align:right; flex-shrink:0; }

    .badge { display:inline-flex; padding:.2rem .55rem; border-radius:var(--r-full); font-size:.68rem; font-weight:600; }
    .badge-green { background:var(--success-bg); color:#065f46; }
    .badge-amber { background:var(--warning-bg); color:#92400e; }

    .empty-state { text-align:center; padding:3rem 1rem; color:var(--gray-400); }
    .skeleton { background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { to { background-position:-200% 0; } }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; transition:color .15s; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }
  </style>
</head>
<body>
<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <span class="top-bar-title">Payment History</span>
  <div class="top-bar-avatar" id="avatarBtn"></div>
</header>

<main class="page-content">
  <div id="summarySection"><div class="skeleton" style="height:80px;border-radius:12px;margin-bottom:1rem"></div></div>
  <div id="paymentList"><div class="skeleton" style="height:200px;border-radius:12px"></div></div>
</main>

<nav class="bottom-nav">
  <a href="/pages/driver/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
  <a href="/pages/driver/payments.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Payments</a>
  <a href="/pages/driver/pre-use-check.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Check</a>
  <a href="/pages/driver/car.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>Car</a>
  <a href="/pages/driver/profile.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href='/index.html'; return; }
    const { data: profile } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!profile || profile.role !== 'driver') { window.location.href='/index.html'; return; }

    const ini = profile.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    av.textContent = ini;
    av.addEventListener('click', async () => { if(confirm('Sign out?')) { await db.auth.signOut(); window.location.href='/index.html'; } });

    const [paymentsRes, assignmentRes] = await Promise.all([
      db.from('payments').select('*').eq('driver_id', profile.id).order('week_starting', { ascending:false }),
      db.from('driver_assignments').select('weekly_payment, hire_start_date').eq('driver_id', profile.id).eq('is_active', true).single(),
    ]);

    const payments   = paymentsRes.data || [];
    const assignment = assignmentRes.data;

    const totalPaid    = payments.filter(p=>p.status==='paid').reduce((s,p)=>s+parseFloat(p.amount||0),0);
    const totalPending = payments.filter(p=>p.status!=='paid').reduce((s,p)=>s+parseFloat(p.amount||0),0);

    // Summary
    document.getElementById('summarySection').innerHTML = `
      ${assignment ? `<div class="rate-banner"><span class="rate-label">Weekly Hire Payment</span><span class="rate-amount">GHS ${assignment.weekly_payment}</span></div>` : ''}
      <div class="summary-grid">
        <div class="summary-card green"><div class="summary-val">GHS ${totalPaid.toFixed(0)}</div><div class="summary-lbl">Total Paid</div></div>
        <div class="summary-card brand"><div class="summary-val">${payments.filter(p=>p.status==='paid').length}</div><div class="summary-lbl">Payments</div></div>
        <div class="summary-card amber"><div class="summary-val">GHS ${totalPending.toFixed(0)}</div><div class="summary-lbl">Pending</div></div>
      </div>`;

    if (!payments.length) {
      document.getElementById('paymentList').innerHTML = `<div class="empty-state"><p>No payments recorded yet.</p></div>`;
      return;
    }

    // Group by month
    const groups = {};
    payments.forEach(p => {
      const d = new Date(p.week_starting);
      const key = d.toLocaleDateString('en-GB', { month:'long', year:'numeric' });
      if (!groups[key]) groups[key] = [];
      groups[key].push(p);
    });

    const methodIcons = { cash:'💵', mobile_money:'📱', bank_transfer:'🏦', other:'📋' };

    document.getElementById('paymentList').innerHTML = Object.entries(groups).map(([month, pmts]) => {
      const monthTotal = pmts.filter(p=>p.status==='paid').reduce((s,p)=>s+parseFloat(p.amount||0),0);
      return `<div class="month-group">
        <div class="month-header" style="display:flex;justify-content:space-between">
          <span>${month}</span><span style="font-family:var(--font-display);color:var(--success)">GHS ${monthTotal.toFixed(2)}</span>
        </div>
        <div class="payment-card">
          ${pmts.map(p => `<div class="payment-row">
            <div class="payment-icon ${p.status==='paid'?'paid':'pending'}">${methodIcons[p.payment_method]||'💳'}</div>
            <div class="payment-info">
              <div class="payment-amount">GHS ${parseFloat(p.amount).toFixed(2)}</div>
              <div class="payment-meta">Week of ${p.week_starting}${p.reference?' · Ref: '+p.reference:''}</div>
              ${p.notes?`<div class="payment-meta">${p.notes}</div>`:''}
            </div>
            <div class="payment-right">
              <span class="badge ${p.status==='paid'?'badge-green':'badge-amber'}">${p.status}</span>
              ${p.paid_at?`<div style="font-size:.68rem;color:var(--gray-400);margin-top:.25rem">${new Date(p.paid_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>`:''}
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }
  init();
</script>
</body>
</html>
