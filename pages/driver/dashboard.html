<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — Driver Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3; --warning:#f59e0b; --warning-bg:#fffbeb;
      --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563;
      --gray-700:#374151; --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); letter-spacing:-.02em; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; flex-shrink:0; margin-left:auto; }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    /* Hero profile card */
    .hero-card {
      background:linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      border-radius:var(--r-lg); padding:1.5rem; margin-bottom:1rem;
      color:#fff; position:relative; overflow:hidden;
    }
    .hero-card::after { content:''; position:absolute; right:-30px; top:-30px; width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,.07); }
    .hero-card::before { content:''; position:absolute; right:40px; bottom:-40px; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,.05); }
    .hero-top { display:flex; align-items:center; gap:1rem; margin-bottom:1.25rem; }
    .hero-avatar { width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,.2); display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:1.1rem; flex-shrink:0; border:2px solid rgba(255,255,255,.3); }
    .hero-name { font-family:var(--font-display); font-weight:700; font-size:1.1rem; }
    .hero-role { font-size:.78rem; opacity:.75; margin-top:.15rem; }
    .hero-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.5rem; }
    .hero-stat { background:rgba(255,255,255,.12); border-radius:var(--r-sm); padding:.75rem .5rem; text-align:center; }
    .hero-stat-val { font-family:var(--font-display); font-weight:700; font-size:1.1rem; }
    .hero-stat-lbl { font-size:.62rem; opacity:.7; text-transform:uppercase; letter-spacing:.05em; margin-top:.15rem; }

    .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.875rem; margin-top:1.25rem; }
    .section-title { font-family:var(--font-display); font-size:.95rem; font-weight:700; color:var(--gray-700); }

    /* Status cards */
    .status-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:.25rem; }
    .status-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:1rem; box-shadow:var(--shadow-sm); }
    .status-card.brand { border-left:3px solid var(--brand); }
    .status-card.green { border-left:3px solid var(--success); }
    .status-card.amber { border-left:3px solid var(--warning); }
    .status-card.red   { border-left:3px solid var(--danger); }
    .status-val { font-family:var(--font-display); font-size:1.3rem; font-weight:700; color:var(--gray-900); line-height:1; margin-bottom:.25rem; }
    .status-lbl { font-size:.7rem; font-weight:500; color:var(--gray-400); text-transform:uppercase; letter-spacing:.05em; }

    /* Car card */
    .car-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; box-shadow:var(--shadow-sm); margin-bottom:.25rem; }
    .car-header { display:flex; align-items:center; gap:.875rem; margin-bottom:1rem; }
    .car-icon { width:48px; height:48px; border-radius:var(--r-md); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; flex-shrink:0; }
    .car-name { font-family:var(--font-display); font-weight:700; font-size:1rem; color:var(--gray-900); }
    .car-plate { font-size:.78rem; color:var(--gray-400); margin-top:.15rem; }
    .car-specs { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
    .car-spec { background:var(--gray-50); border-radius:var(--r-sm); padding:.625rem .75rem; }
    .car-spec-lbl { font-size:.65rem; font-weight:600; text-transform:uppercase; color:var(--gray-400); margin-bottom:.15rem; }
    .car-spec-val { font-size:.85rem; font-weight:600; color:var(--gray-800); }

    /* Quick actions */
    .action-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
    .action-btn { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:1rem .875rem; display:flex; flex-direction:column; align-items:flex-start; gap:.5rem; text-decoration:none; transition:box-shadow .15s,border-color .15s; }
    .action-btn:hover { border-color:var(--brand); box-shadow:0 4px 12px rgba(0,0,0,.1); }
    .action-icon { width:36px; height:36px; border-radius:var(--r-sm); display:grid; place-items:center; }
    .action-icon.blue  { background:var(--brand-light); color:var(--brand); }
    .action-icon.green { background:var(--success-bg);  color:var(--success); }
    .action-icon.amber { background:var(--warning-bg);  color:var(--warning); }
    .action-icon.red   { background:var(--danger-bg);   color:var(--danger); }
    .action-label { font-size:.8rem; font-weight:600; color:var(--gray-700); line-height:1.3; }

    /* Recent payments */
    .payment-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; box-shadow:var(--shadow-sm); }
    .payment-row { display:flex; justify-content:space-between; align-items:center; padding:.625rem 0; border-bottom:1px solid var(--gray-100); font-size:.85rem; }
    .payment-row:last-child { border-bottom:none; }
    .payment-amount { font-weight:700; color:var(--gray-900); }
    .payment-meta   { font-size:.73rem; color:var(--gray-400); margin-top:.1rem; }

    /* Check status banner */
    .check-banner { border-radius:var(--r-md); padding:.875rem 1rem; margin-bottom:.25rem; display:flex; align-items:center; gap:.75rem; font-size:.85rem; font-weight:500; }
    .check-banner.pending  { background:var(--warning-bg); color:#92400e; border:1px solid #fde68a; }
    .check-banner.approved { background:var(--success-bg); color:#065f46; border:1px solid #a7f3d0; }
    .check-banner.none     { background:var(--danger-bg);  color:#991b1b; border:1px solid #fca5a5; }

    .badge { display:inline-flex; padding:.25rem .6rem; border-radius:var(--r-full); font-size:.7rem; font-weight:600; }
    .badge-green { background:var(--success-bg); color:#065f46; }
    .badge-amber { background:var(--warning-bg); color:#92400e; }
    .badge-red   { background:var(--danger-bg);  color:#991b1b; }

    .empty-state { text-align:center; padding:1.5rem; color:var(--gray-400); font-size:.85rem; }
    .skeleton { background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { to { background-position:-200% 0; } }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; transition:color .15s; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }

    #toast-container { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:999; width:calc(100% - 2rem); max-width:420px; pointer-events:none; }
    .toast { background:var(--gray-900); color:#fff; padding:.75rem 1rem; border-radius:var(--r-md); font-size:.85rem; font-weight:500; margin-bottom:.5rem; animation:toast-in .2s ease; }
    .toast.success { background:#065f46; }
    .toast.error   { background:#991b1b; }
    @keyframes toast-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <div class="top-bar-avatar" id="avatarBtn"></div>
</header>

<main class="page-content">

  <!-- Hero -->
  <div class="hero-card" id="heroCard">
    <div class="hero-top">
      <div class="hero-avatar" id="heroInitials">—</div>
      <div>
        <div class="hero-name" id="heroName">Loading…</div>
        <div class="hero-role">Driver</div>
      </div>
    </div>
    <div class="hero-stats">
      <div class="hero-stat"><div class="hero-stat-val" id="heroWeeks">—</div><div class="hero-stat-lbl">Weeks Active</div></div>
      <div class="hero-stat"><div class="hero-stat-val" id="heroPaid">—</div><div class="hero-stat-lbl">Total Paid</div></div>
      <div class="hero-stat"><div class="hero-stat-val" id="heroBalance">—</div><div class="hero-stat-lbl">This Week</div></div>
    </div>
  </div>

  <!-- Today's check status -->
  <div class="section-head" style="margin-top:1rem"><span class="section-title">Today's Pre-Use Check</span></div>

  <!-- Car -->
  <div class="section-head"><span class="section-title">My Vehicle</span><a href="/pages/driver/car.html" style="font-size:.8rem;color:var(--brand)">Details →</a></div>
  <div id="carSection"><div class="skeleton" style="height:160px;border-radius:16px"></div></div>

  <!-- Quick Actions -->
  <div class="section-head"><span class="section-title">Quick Actions</span></div>
  <div class="action-grid">
    <a href="/pages/driver/pre-use-check.html" class="action-btn">
      <div class="action-icon blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
      <span class="action-label">Submit Pre-Use Check</span>
    </a>
    <a href="/pages/driver/payments.html" class="action-btn">
      <div class="action-icon green"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
      <span class="action-label">Payment History</span>
    </a>
    <a href="/pages/driver/car.html" class="action-btn">
      <div class="action-icon amber"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg></div>
      <span class="action-label">Car Details</span>
    </a>
    <a href="/pages/driver/profile.html" class="action-btn">
      <div class="action-icon red"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <span class="action-label">My Profile</span>
    </a>
  </div>

  <!-- Recent Payments -->
  <div class="section-head"><span class="section-title">Recent Payments</span><a href="/pages/driver/payments.html" style="font-size:.8rem;color:var(--brand)">View all</a></div>
  <div class="payment-card" id="recentPayments">
    <div class="skeleton" style="height:14px;margin-bottom:.75rem"></div>
    <div class="skeleton" style="height:14px;width:70%"></div>
  </div>

</main>

<nav class="bottom-nav">
  <a href="/pages/driver/dashboard.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a href="/pages/driver/payments.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    Payments
  </a>
  <a href="/pages/driver/pre-use-check.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Check
  </a>
  <a href="/pages/driver/car.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>
    Car
  </a>
  <a href="/pages/driver/profile.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </a>
</nav>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href='/index.html'; return; }
    const { data: profile } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!profile || profile.role !== 'driver') { window.location.href='/index.html'; return; }

    // Avatar + signout
    const ini = profile.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    av.textContent = ini;
    av.addEventListener('click', async () => { if(confirm('Sign out?')) { await db.auth.signOut(); window.location.href='/index.html'; } });

    // Hero
    document.getElementById('heroInitials').textContent = ini;
    document.getElementById('heroName').textContent = profile.full_name;

    // Load everything in parallel
    const today = new Date().toISOString().split('T')[0];
    const [assignmentRes, paymentsRes, todayCheckRes] = await Promise.all([
      db.from('driver_assignments').select('*, cars(*)').eq('driver_id', profile.id).eq('is_active', true).single(),
      db.from('payments').select('*').eq('driver_id', profile.id).order('created_at', { ascending:false }),
      db.from('pre_use_checks').select('*').eq('driver_id', profile.id).eq('check_date', today).order('submitted_at', { ascending:false }).limit(1),
    ]);

    const assignment = assignmentRes.data;
    const payments   = paymentsRes.data || [];
    const todayCheck = todayCheckRes.data?.[0];

    // Hero stats
    const totalPaid = payments.reduce((s,p) => s + parseFloat(p.amount||0), 0);
    const weeksActive = assignment?.hire_start_date ? Math.floor((new Date()-new Date(assignment.hire_start_date))/(7*24*60*60*1000)) : 0;
    const weekPaid = payments.filter(p => {
      const monday = new Date(); monday.setDate(monday.getDate() - monday.getDay() + 1);
      return new Date(p.paid_at||p.created_at) >= monday;
    }).reduce((s,p) => s + parseFloat(p.amount||0), 0);

    document.getElementById('heroWeeks').textContent  = weeksActive;
    document.getElementById('heroPaid').textContent   = 'GHS ' + (totalPaid/1000 >= 1 ? (totalPaid/1000).toFixed(1)+'k' : totalPaid.toFixed(0));
    document.getElementById('heroBalance').textContent = 'GHS ' + weekPaid.toFixed(0);

    // Today's check banner
    const banner = document.getElementById('checkBanner');
    if (!todayCheck) {
      banner.innerHTML = `<div class="check-banner none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div style="flex:1">No check submitted today.</div>
        <a href="/pages/driver/pre-use-check.html" style="color:#991b1b;font-weight:700;font-size:.82rem;white-space:nowrap">Submit →</a>
      </div>`;
    } else if (todayCheck.status === 'pending') {
      banner.innerHTML = `<div class="check-banner pending">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <div style="flex:1">Check submitted — awaiting officer approval.</div>
      </div>`;
    } else if (todayCheck.status === 'approved') {
      banner.innerHTML = `<div class="check-banner approved">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <div style="flex:1">Today's check approved! ✅</div>
      </div>`;
    } else {
      banner.innerHTML = `<div class="check-banner none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <div style="flex:1">Check declined. <a href="/pages/driver/pre-use-check.html" style="color:#991b1b;font-weight:700">Resubmit →</a></div>
      </div>`;
    }

    // Car section
    const carSec = document.getElementById('carSection');
    if (!assignment?.cars) {
      carSec.innerHTML = `<div style="background:var(--warning-bg);border-radius:12px;padding:1rem;font-size:.85rem;color:#92400e;border:1px solid #fde68a">⚠️ No vehicle assigned to you yet. Contact your officer.</div>`;
    } else {
      const c = assignment.cars;
      carSec.innerHTML = `<div class="car-card">
        <div class="car-header">
          <div class="car-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg></div>
          <div style="flex:1">
            <div class="car-name">${c.make} ${c.model} ${c.year}</div>
            <div class="car-plate">${c.plate_number}${c.color?' · '+c.color:''}</div>
          </div>
          <span style="background:var(--success-bg);color:#065f46;padding:.25rem .6rem;border-radius:var(--r-full);font-size:.7rem;font-weight:600">Active</span>
        </div>
        <div class="car-specs">
          <div class="car-spec"><div class="car-spec-lbl">Weekly Payment</div><div class="car-spec-val">GHS ${assignment.weekly_payment}</div></div>
          <div class="car-spec"><div class="car-spec-lbl">Hire Started</div><div class="car-spec-val">${new Date(assignment.hire_start_date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div></div>
          <div class="car-spec"><div class="car-spec-lbl">Mileage</div><div class="car-spec-val">${c.mileage ? c.mileage.toLocaleString()+' km' : '—'}</div></div>
          <div class="car-spec"><div class="car-spec-lbl">VIN</div><div class="car-spec-val" style="font-size:.75rem">${c.vin||'—'}</div></div>
        </div>
      </div>`;
    }

    // Recent payments
    const payEl = document.getElementById('recentPayments');
    if (!payments.length) {
      payEl.innerHTML = `<div class="empty-state">No payments recorded yet.</div>`;
    } else {
      payEl.innerHTML = payments.slice(0,4).map(p => `
        <div class="payment-row">
          <div><div class="payment-amount">GHS ${parseFloat(p.amount).toFixed(2)}</div><div class="payment-meta">Week of ${p.week_starting} · ${p.payment_method||'cash'}</div></div>
          <span class="badge ${p.status==='paid'?'badge-green':'badge-amber'}">${p.status}</span>
        </div>`).join('');
    }
  }
  init();
</script>
</body>
</html>
