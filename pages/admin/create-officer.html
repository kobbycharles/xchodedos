<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — New Officer Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3;
      --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563;
      --gray-700:#374151; --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); }
    .top-bar-title { font-weight:600; font-size:1rem; flex:1; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    .back-btn { display:inline-flex; align-items:center; gap:.4rem; color:var(--gray-500); font-size:.85rem; font-weight:500; margin-bottom:1.25rem; background:none; border:none; padding:0; cursor:pointer; }
    .back-btn:hover { color:var(--brand); }

    .page-title { font-family:var(--font-display); font-size:1.3rem; font-weight:700; color:var(--gray-900); letter-spacing:-.02em; margin-bottom:.25rem; }
    .page-sub { font-size:.82rem; color:var(--gray-400); margin-bottom:1.5rem; }

    .card { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; box-shadow:var(--shadow-sm); }

    .section-divider { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gray-400); margin:1.5rem 0 1rem; display:flex; align-items:center; gap:.75rem; }
    .section-divider:first-child { margin-top:0; }
    .section-divider::after { content:''; flex:1; height:1px; background:var(--border); }

    .form-group { margin-bottom:1rem; }
    .form-label { display:block; font-size:.75rem; font-weight:600; color:var(--gray-600); letter-spacing:.05em; text-transform:uppercase; margin-bottom:.4rem; }
    .form-input, .form-textarea { width:100%; background:var(--gray-50); border:1.5px solid var(--border); border-radius:var(--r-sm); color:var(--gray-800); font-family:var(--font-body); font-size:.9rem; padding:.7rem .875rem; outline:none; transition:border-color .15s, box-shadow .15s; }
    .form-input:focus, .form-textarea:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(26,86,219,.12); background:#fff; }
    .form-textarea { resize:vertical; min-height:70px; }

    .pw-hint { font-size:.73rem; color:var(--gray-400); margin-top:.35rem; }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.8rem 1.25rem; border:none; border-radius:var(--r-sm); font-family:var(--font-body); font-size:.9rem; font-weight:600; cursor:pointer; transition:opacity .15s, transform .1s; }
    .btn:active { transform:scale(.98); }
    .btn:disabled { opacity:.5; pointer-events:none; }
    .btn-primary { background:var(--brand); color:#fff; }
    .btn-primary:hover { background:var(--brand-dark); }
    .btn-outline { background:transparent; color:var(--brand); border:1.5px solid var(--brand); }
    .btn-full { width:100%; }

    .spinner { width:18px; height:18px; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .65s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .error-box { margin-top:.875rem; padding:.75rem; background:var(--danger-bg); border:1px solid #fca5a5; border-radius:var(--r-sm); font-size:.82rem; color:#991b1b; display:none; }
    .error-box.show { display:block; }

    .success-banner { display:none; background:var(--success-bg); border:1px solid #a7f3d0; border-radius:var(--r-md); padding:1rem; margin-bottom:1.25rem; text-align:center; }
    .success-banner.show { display:block; }
    .success-banner .s-icon { font-size:2rem; margin-bottom:.5rem; }
    .success-banner p { font-size:.85rem; color:#065f46; font-weight:500; }
    .success-banner .s-name { font-family:var(--font-display); font-weight:700; font-size:1rem; color:#065f46; margin-bottom:.25rem; }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }

    #toast-container { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:999; width:calc(100% - 2rem); max-width:420px; pointer-events:none; }
    .toast { background:var(--gray-900); color:#fff; padding:.75rem 1rem; border-radius:var(--r-md); font-size:.85rem; font-weight:500; margin-bottom:.5rem; animation:toast-in .2s ease; }
    .toast.success { background:#065f46; }
    .toast.error { background:#991b1b; }
    @keyframes toast-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>

<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <span class="top-bar-title">New Officer</span>
  <div class="top-bar-avatar" id="avatarBtn"></div>
</header>

<main class="page-content">

  <button class="back-btn" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>

  <div class="page-title">New Officer Account</div>
  <div class="page-sub">Create a login for a Relationship Officer.</div>

  <div class="success-banner" id="successBanner">
    <div class="s-icon">🎉</div>
    <div class="s-name" id="successName"></div>
    <p>Account created successfully.<br/>They can now sign in with their email and password.</p>
    <div style="margin-top:1rem;display:flex;gap:.75rem;justify-content:center">
      <button class="btn btn-outline" onclick="resetForm()">Add Another</button>
      <a href="/pages/admin/officers.html" class="btn btn-primary">View Officers</a>
    </div>
  </div>

  <div id="formWrap">
    <div class="card">
      <div class="section-divider">Personal Details</div>
      <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" type="text" id="fullName" placeholder="e.g. Kwame Asante" autocomplete="name"/></div>
      <div class="form-group"><label class="form-label">Phone Number *</label><input class="form-input" type="tel" id="phone" placeholder="+233 XX XXX XXXX" inputmode="tel"/></div>
      <div class="form-group"><label class="form-label">ID / Staff Number</label><input class="form-input" type="text" id="idNumber" placeholder="e.g. XC-RO-001"/></div>
      <div class="form-group"><label class="form-label">Address</label><textarea class="form-textarea" id="address" placeholder="Officer's home or work address" rows="2"></textarea></div>

      <div class="section-divider">Login Credentials</div>
      <div class="form-group"><label class="form-label">Email Address *</label><input class="form-input" type="email" id="email" placeholder="officer@example.com" inputmode="email"/></div>
      <div class="form-group">
        <label class="form-label">Temporary Password *</label>
        <input class="form-input" type="text" id="password" placeholder="Min. 8 characters"/>
        <div class="pw-hint">Share this with the officer. They should change it on first login.</div>
      </div>
    </div>

    <div class="error-box" id="errMsg"></div>

    <button class="btn btn-primary btn-full" style="margin-top:1rem" id="createBtn" onclick="createOfficer()">
      <span id="btnLabel">Create Account</span>
      <div class="spinner" id="btnSpinner" style="display:none"></div>
    </button>
  </div>

</main>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function toast(msg, type='default') {
    const c=document.getElementById('toast-container'); const el=document.createElement('div');
    el.className='toast '+type; el.textContent=msg; c.appendChild(el); setTimeout(()=>el.remove(),3000);
  }

  let adminProfile = null;

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href='/index.html'; return; }
    const { data: p } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!p || p.role !== 'super_admin') { window.location.href='/index.html'; return; }
    adminProfile = p;

    const ini = p.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    av.textContent = ini;
    av.addEventListener('click', async () => { if(confirm('Sign out?')) { await db.auth.signOut(); window.location.href='/index.html'; } });
  }

  window.createOfficer = async function() {
    const fullName = document.getElementById('fullName').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const idNumber = document.getElementById('idNumber').value.trim();
    const address  = document.getElementById('address').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const err = document.getElementById('errMsg');
    err.style.display = 'none';

    if (!fullName || !phone || !email || !password) {
      err.textContent = 'Please fill in all required fields (marked with *).';
      err.style.display = 'block';
      return;
    }
    if (password.length < 8) {
      err.textContent = 'Password must be at least 8 characters.';
      err.style.display = 'block';
      return;
    }

    const btn = document.getElementById('createBtn');
    document.getElementById('btnLabel').style.display = 'none';
    document.getElementById('btnSpinner').style.display = 'block';
    btn.disabled = true;

    try {
      // IMPORTANT: signUp() will switch the current browser session to the new
      // officer's account. We capture the admin's session first, create the
      // new account, then immediately restore the admin's session.
      const { data: { session: adminSession } } = await db.auth.getSession();

      const { data: authData, error: authErr } = await db.auth.signUp({
        email,
        password,
        options: { data: { full_name: fullName, role: 'relationship_officer' } }
      });

      if (authErr) throw authErr;

      const userId = authData.user?.id;
      if (!userId) throw new Error('Account creation failed — no user ID returned.');

      // Restore the admin's session immediately so we stay logged in as admin
      if (adminSession) {
        await db.auth.setSession({
          access_token: adminSession.access_token,
          refresh_token: adminSession.refresh_token,
        });
      }

      // Update the auto-created profile with the officer's details
      const { error: profileErr } = await db
        .from('profiles')
        .update({
          full_name: fullName,
          phone,
          id_number: idNumber || null,
          address: address || null,
          role: 'relationship_officer',
        })
        .eq('id', userId);

      if (profileErr) throw profileErr;

      document.getElementById('formWrap').style.display = 'none';
      document.getElementById('successName').textContent = fullName;
      document.getElementById('successBanner').classList.add('show');
      toast('Officer account created!', 'success');

    } catch (e) {
      err.textContent = e.message || 'Failed to create account. Please try again.';
      err.style.display = 'block';
    } finally {
      document.getElementById('btnLabel').style.display = '';
      document.getElementById('btnSpinner').style.display = 'none';
      btn.disabled = false;
    }
  };

  window.resetForm = function() {
    document.getElementById('successBanner').classList.remove('show');
    document.getElementById('formWrap').style.display = '';
    ['fullName','phone','idNumber','address','email','password'].forEach(id => {
      document.getElementById(id).value = '';
    });
  };

  init();
</script>
</body>
</html>
