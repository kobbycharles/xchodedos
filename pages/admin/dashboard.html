<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3;
      --warning:#f59e0b; --warning-bg:#fffbeb;
      --danger:#ef4444;  --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-300:#d1d5db; --gray-400:#9ca3af; --gray-500:#6b7280;
      --gray-600:#4b5563; --gray-700:#374151; --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --surface:#ffffff; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); letter-spacing:-.02em; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; flex-shrink:0; margin-left:auto; }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    .greeting { margin-bottom:1.5rem; }
    .greeting-name { font-family:var(--font-display); font-size:1.3rem; font-weight:700; color:var(--gray-900); letter-spacing:-.02em; }
    .greeting-role { font-size:.8rem; color:var(--gray-400); margin-top:.15rem; }

    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1.5rem; }
    .stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:1rem; box-shadow:var(--shadow-sm); }
    .stat-card.brand { border-left:3px solid var(--brand); }
    .stat-card.green { border-left:3px solid var(--success); }
    .stat-card.amber { border-left:3px solid var(--warning); }
    .stat-card.red   { border-left:3px solid var(--danger); }
    .stat-value { font-family:var(--font-display); font-size:1.5rem; font-weight:700; color:var(--gray-900); line-height:1; margin-bottom:.25rem; }
    .stat-label { font-size:.72rem; font-weight:500; color:var(--gray-400); text-transform:uppercase; letter-spacing:.05em; }

    .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.875rem; margin-top:1.5rem; }
    .section-title { font-family:var(--font-display); font-size:.95rem; font-weight:700; color:var(--gray-700); }

    .quick-actions { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1rem; }
    .qa-btn { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:1rem .875rem; display:flex; flex-direction:column; align-items:flex-start; gap:.5rem; cursor:pointer; transition:box-shadow .15s,border-color .15s; text-decoration:none; }
    .qa-btn:hover { border-color:var(--brand); box-shadow:0 4px 12px rgba(0,0,0,.1); }
    .qa-icon { width:36px; height:36px; border-radius:var(--r-sm); display:grid; place-items:center; }
    .qa-icon.blue  { background:var(--brand-light); color:var(--brand); }
    .qa-icon.green { background:var(--success-bg);  color:var(--success); }
    .qa-icon.amber { background:var(--warning-bg);  color:var(--warning); }
    .qa-icon.red   { background:var(--danger-bg);   color:var(--danger); }
    .qa-label { font-size:.8rem; font-weight:600; color:var(--gray-700); line-height:1.3; }

    .card { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; box-shadow:var(--shadow-sm); }
    .list-row { display:flex; align-items:center; gap:.875rem; padding:.875rem 0; border-bottom:1px solid var(--border); }
    .list-row:last-child { border-bottom:none; }
    .list-avatar { width:42px; height:42px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.9rem; flex-shrink:0; }
    .list-name { font-weight:600; font-size:.9rem; color:var(--gray-800); }
    .list-sub  { font-size:.78rem; color:var(--gray-400); margin-top:.1rem; }
    .list-right { margin-left:auto; }
    .badge { display:inline-flex; align-items:center; padding:.25rem .6rem; border-radius:var(--r-full); font-size:.7rem; font-weight:600; white-space:nowrap; }
    .badge-green { background:var(--success-bg); color:#065f46; }
    .badge-gray  { background:var(--gray-100);   color:var(--gray-600); }

    .empty-state { text-align:center; padding:2rem 1rem; color:var(--gray-400); }
    .empty-state p { font-size:.9rem; }

    .skeleton { background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { to { background-position:-200% 0; } }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.68rem; font-weight:500; padding:.5rem 0; text-decoration:none; transition:color .15s; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }

    #toast-container { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:999; width:calc(100% - 2rem); max-width:420px; pointer-events:none; }
    .toast { background:var(--gray-900); color:#fff; padding:.75rem 1rem; border-radius:var(--r-md); font-size:.85rem; font-weight:500; margin-bottom:.5rem; animation:toast-in .2s ease; }
    .toast.success { background:#065f46; }
    .toast.error   { background:#991b1b; }
    @keyframes toast-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>

<div class="app-shell">
  <header class="top-bar">
    <span class="top-bar-logo">xchodedos</span>
    <div class="top-bar-avatar" id="avatarBtn" title="Sign out"></div>
  </header>

  <main class="page-content">
    <div class="greeting">
      <div class="greeting-name" id="greetName">Loading…</div>
      <div class="greeting-role">Super Admin</div>
    </div>

    <div class="stat-grid">
      <div class="stat-card brand"><div class="stat-value" id="statDrivers">—</div><div class="stat-label">Active Drivers</div></div>
      <div class="stat-card green"><div class="stat-value" id="statOfficers">—</div><div class="stat-label">Officers</div></div>
      <div class="stat-card amber"><div class="stat-value" id="statLeads">—</div><div class="stat-label">Active Leads</div></div>
      <div class="stat-card red"><div class="stat-value" id="statCars">—</div><div class="stat-label">Fleet Cars</div></div>
    </div>

    <div class="section-head" style="margin-top:0"><span class="section-title">Quick Actions</span></div>
    <div class="quick-actions">
      <a href="/pages/admin/create-officer.html" class="qa-btn">
        <div class="qa-icon blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg></div>
        <span class="qa-label">New Officer Account</span>
      </a>
      <a href="/pages/admin/officers.html" class="qa-btn">
        <div class="qa-icon green"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <span class="qa-label">Manage Officers</span>
      </a>
      <a href="/pages/admin/assign-driver.html" class="qa-btn">
        <div class="qa-icon amber"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></div>
        <span class="qa-label">Assign Driver to Officer</span>
      </a>
      <a href="/pages/admin/settings.html" class="qa-btn">
        <div class="qa-icon red"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
        <span class="qa-label">Settings</span>
      </a>
    </div>

    <div class="section-head"><span class="section-title">Relationship Officers</span><a href="/pages/admin/officers.html" style="font-size:.8rem;color:var(--brand)">View all</a></div>
    <div class="card" id="officerList">
      <div style="padding:.5rem 0">
        <div class="skeleton" style="height:14px;width:60%;margin-bottom:.75rem"></div>
        <div class="skeleton" style="height:14px;width:40%"></div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="/pages/admin/dashboard.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/pages/admin/officers.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Officers
    </a>
    <a href="/pages/admin/assign-driver.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      Assign
    </a>
    <a href="/pages/admin/settings.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
  </nav>
</div>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function toast(msg, type='default') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  async function init() {
    // Check session
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = '/index.html'; return; }

    // Get profile
    const { data: profile, error } = await db
      .from('profiles')
      .select('*')
      .eq('id', session.user.id)
      .single();

    if (!profile || profile.role !== 'super_admin') {
      window.location.href = '/index.html';
      return;
    }

    // Greeting
    const hour = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greetName').textContent = greet + ', ' + profile.full_name.split(' ')[0] + ' 👋';

    // Avatar
    const ini = profile.full_name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    av.textContent = ini;
    av.addEventListener('click', async () => {
      if (confirm('Sign out?')) {
        await db.auth.signOut();
        window.location.href = '/index.html';
      }
    });

    // Stats
    const [d, o, l, c] = await Promise.all([
      db.from('profiles').select('id', { count:'exact', head:true }).eq('role','driver').eq('is_active',true),
      db.from('profiles').select('id', { count:'exact', head:true }).eq('role','relationship_officer').eq('is_active',true),
      db.from('leads').select('id', { count:'exact', head:true }).neq('status','approved').neq('status','rejected'),
      db.from('cars').select('id', { count:'exact', head:true }).neq('status','retired'),
    ]);
    document.getElementById('statDrivers').textContent  = d.count ?? 0;
    document.getElementById('statOfficers').textContent = o.count ?? 0;
    document.getElementById('statLeads').textContent    = l.count ?? 0;
    document.getElementById('statCars').textContent     = c.count ?? 0;

    // Officers list
    const { data: officers } = await db
      .from('profiles')
      .select('id, full_name, email, is_active')
      .eq('role', 'relationship_officer')
      .order('created_at', { ascending: false })
      .limit(5);

    const list = document.getElementById('officerList');
    if (!officers || officers.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>No officers yet. <a href="/pages/admin/create-officer.html" style="color:var(--brand)">Create one →</a></p></div>`;
    } else {
      list.innerHTML = officers.map(o => {
        const ini = o.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
        return `<div class="list-row">
          <div class="list-avatar">${ini}</div>
          <div><div class="list-name">${o.full_name}</div><div class="list-sub">${o.email}</div></div>
          <div class="list-right"><span class="badge ${o.is_active ? 'badge-green':'badge-gray'}">${o.is_active ? 'Active':'Inactive'}</span></div>
        </div>`;
      }).join('');
    }
  }

  init();
</script>
</body>
</html>
