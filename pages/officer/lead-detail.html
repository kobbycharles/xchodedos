<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — Manage Lead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3; --warning:#f59e0b; --warning-bg:#fffbeb;
      --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563;
      --gray-700:#374151; --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); }
    .top-bar-title { font-weight:600; font-size:1rem; flex:1; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; }
    .back-btn { display:inline-flex; align-items:center; gap:.3rem; color:var(--gray-500); font-size:.85rem; font-weight:500; background:none; border:none; padding:0; cursor:pointer; margin-bottom:1.25rem; }
    .back-btn:hover { color:var(--brand); }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    /* Hero */
    .lead-hero { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.5rem; margin-bottom:1rem; text-align:center; box-shadow:var(--shadow-sm); }
    .hero-avatar { width:64px; height:64px; border-radius:50%; background:var(--brand); color:#fff; display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:1.3rem; margin:0 auto .875rem; }
    .hero-name { font-family:var(--font-display); font-weight:700; font-size:1.15rem; color:var(--gray-900); margin-bottom:.25rem; }
    .hero-sub  { font-size:.8rem; color:var(--gray-400); margin-bottom:.75rem; }

    .badge { display:inline-flex; padding:.3rem .75rem; border-radius:var(--r-full); font-size:.75rem; font-weight:600; }
    .badge-green { background:var(--success-bg); color:#065f46; }
    .badge-amber { background:var(--warning-bg); color:#92400e; }
    .badge-red   { background:var(--danger-bg);  color:#991b1b; }
    .badge-blue  { background:var(--brand-light); color:var(--brand-dark); }
    .badge-gray  { background:var(--gray-100);   color:var(--gray-600); }

    /* Pipeline progress */
    .pipeline-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; margin-bottom:1rem; box-shadow:var(--shadow-sm); }
    .pipeline-title { font-family:var(--font-display); font-size:.88rem; font-weight:700; color:var(--gray-700); margin-bottom:1.25rem; }
    .pipeline-step { display:flex; gap:1rem; }
    .step-left { display:flex; flex-direction:column; align-items:center; width:28px; flex-shrink:0; }
    .step-circle { width:28px; height:28px; border-radius:50%; display:grid; place-items:center; font-size:.75rem; font-weight:700; border:2px solid var(--border); background:#fff; color:var(--gray-400); flex-shrink:0; }
    .step-circle.done   { background:var(--success); border-color:var(--success); color:#fff; }
    .step-circle.active { background:var(--brand); border-color:var(--brand); color:#fff; }
    .step-line { flex:1; width:2px; background:var(--border); margin:2px 0; min-height:20px; }
    .step-line.done { background:var(--success); }
    .step-right { flex:1; padding-bottom:1rem; }
    .step-label { font-weight:600; font-size:.85rem; color:var(--gray-800); margin-bottom:.15rem; }

    /* Action cards */
    .action-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; margin-bottom:1rem; box-shadow:var(--shadow-sm); }
    .action-card-title { font-family:var(--font-display); font-size:.85rem; font-weight:700; color:var(--gray-700); margin-bottom:1rem; display:flex; align-items:center; justify-content:space-between; }

    .form-group { margin-bottom:.875rem; }
    .form-label { display:block; font-size:.75rem; font-weight:600; color:var(--gray-600); letter-spacing:.05em; text-transform:uppercase; margin-bottom:.4rem; }
    .form-input, .form-select { width:100%; background:var(--gray-50); border:1.5px solid var(--border); border-radius:var(--r-sm); color:var(--gray-800); font-family:var(--font-body); font-size:.9rem; padding:.7rem .875rem; outline:none; appearance:none; }
    .form-input:focus, .form-select:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(26,86,219,.12); background:#fff; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.65rem 1.1rem; border:none; border-radius:var(--r-sm); font-family:var(--font-body); font-size:.84rem; font-weight:600; cursor:pointer; transition:opacity .15s; }
    .btn:disabled { opacity:.5; pointer-events:none; }
    .btn-primary { background:var(--brand); color:#fff; }
    .btn-success { background:var(--success); color:#fff; }
    .btn-danger  { background:var(--danger); color:#fff; }
    .btn-outline { background:transparent; color:var(--brand); border:1.5px solid var(--brand); }
    .btn-full { width:100%; }

    .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .65s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Guarantor item */
    .guarantor-item { background:var(--gray-50); border-radius:var(--r-md); padding:.875rem; margin-bottom:.75rem; }
    .guarantor-item:last-child { margin-bottom:0; }
    .g-header { display:flex; align-items:center; gap:.75rem; margin-bottom:.625rem; }
    .g-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.78rem; flex-shrink:0; }
    .g-name { font-weight:600; font-size:.86rem; }
    .g-sub { font-size:.72rem; color:var(--gray-400); margin-top:.1rem; }
    .g-detail { font-size:.78rem; color:var(--gray-500); margin-bottom:.2rem; }

    .deposit-status { display:flex; align-items:center; justify-content:space-between; padding:.875rem; background:var(--gray-50); border-radius:var(--r-md); margin-bottom:.875rem; }
    .deposit-amount { font-family:var(--font-display); font-weight:700; font-size:1.1rem; }

    .error-box { padding:.7rem; background:var(--danger-bg); border:1px solid #fca5a5; border-radius:var(--r-sm); font-size:.8rem; color:#991b1b; margin-top:.75rem; display:none; }
    .error-box.show { display:block; }

    .notes-box { background:var(--gray-50); border-radius:var(--r-sm); padding:.75rem; font-size:.82rem; color:var(--gray-600); line-height:1.5; }

    .skeleton { background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { to { background-position:-200% 0; } }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }

    #toast-container { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:999; width:calc(100% - 2rem); max-width:420px; pointer-events:none; }
    .toast { background:var(--gray-900); color:#fff; padding:.75rem 1rem; border-radius:var(--r-md); font-size:.85rem; font-weight:500; margin-bottom:.5rem; animation:toast-in .2s ease; }
    .toast.success { background:#065f46; }
    .toast.error { background:#991b1b; }
    @keyframes toast-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <span class="top-bar-title">Manage Lead</span>
  <div class="top-bar-avatar" id="avatarBtn"></div>
</header>

<main class="page-content">
  <button class="back-btn" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Leads
  </button>

  <div id="content"><div class="skeleton" style="height:200px;border-radius:16px;margin-bottom:1rem"></div><div class="skeleton" style="height:300px;border-radius:16px"></div></div>
</main>

<nav class="bottom-nav">
  <a href="/pages/officer/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
  <a href="/pages/officer/drivers.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Drivers</a>
  <a href="/pages/officer/leads.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>Leads</a>
  <a href="/pages/officer/checks.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Checks</a>
  <a href="/pages/officer/fleet.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>Fleet</a>
</nav>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let officerProfile = null, lead = null, leadProfile = null, guarantors = [];

  function toast(msg, type='default') {
    const c=document.getElementById('toast-container'); const el=document.createElement('div');
    el.className='toast '+type; el.textContent=msg; c.appendChild(el); setTimeout(()=>el.remove(),3000);
  }

  const statusBadge = { registered:'badge-blue', test_scheduled:'badge-amber', test_passed:'badge-green', test_failed:'badge-red', guarantors_pending:'badge-amber', deposit_pending:'badge-amber', approved:'badge-green', rejected:'badge-red' };
  const statusSteps = [
    { key:'registered',         label:'Lead Registered' },
    { key:'test_scheduled',     label:'Tests Scheduled' },
    { key:'test_passed',        label:'Tests Passed' },
    { key:'guarantors_pending', label:'Guarantors Verified' },
    { key:'deposit_pending',    label:'Deposit Paid' },
    { key:'approved',           label:'Approved' },
  ];

  function renderPipeline() {
    const idx = statusSteps.findIndex(s => s.key === lead.status);
    const effectiveIdx = idx === -1 ? 0 : idx;
    return statusSteps.map((s,i) => {
      const isLast = i === statusSteps.length-1;
      const done = i < effectiveIdx || lead.status==='approved';
      const active = i === effectiveIdx && lead.status!=='approved';
      return `<div class="pipeline-step">
        <div class="step-left">
          <div class="step-circle ${done?'done':active?'active':''}">${done?'✓':i+1}</div>
          ${!isLast?`<div class="step-line ${done?'done':''}"></div>`:''}
        </div>
        <div class="step-right"><div class="step-label">${s.label}</div></div>
      </div>`;
    }).join('');
  }

  function renderContent() {
    const ini = leadProfile.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const content = document.getElementById('content');

    content.innerHTML = `
      <!-- Hero -->
      <div class="lead-hero">
        <div class="hero-avatar">${ini}</div>
        <div class="hero-name">${leadProfile.full_name}</div>
        <div class="hero-sub">${leadProfile.phone||leadProfile.email||'—'}</div>
        <span class="badge ${statusBadge[lead.status]||'badge-gray'}">${lead.status.replace(/_/g,' ')}</span>
      </div>

      <!-- Pipeline -->
      <div class="pipeline-card">
        <div class="pipeline-title">Application Pipeline</div>
        ${renderPipeline()}
      </div>

      <!-- Test scores -->
      <div class="action-card">
        <div class="action-card-title">📋 Drive & Knowledge Tests</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Drive Test Date</label>
            <input class="form-input" id="driveDate" type="date" value="${lead.drive_test_date||''}"/>
          </div>
          <div class="form-group">
            <label class="form-label">Drive Score</label>
            <input class="form-input" id="driveScore" type="number" inputmode="numeric" placeholder="0-100" value="${lead.drive_test_score??''}"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Drive Test Result</label>
          <select class="form-select" id="drivePassed">
            <option value="" ${lead.drive_test_passed===null?'selected':''}>Not yet graded</option>
            <option value="true" ${lead.drive_test_passed===true?'selected':''}>Pass</option>
            <option value="false" ${lead.drive_test_passed===false?'selected':''}>Fail</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Knowledge Test Date</label>
            <input class="form-input" id="knowDate" type="date" value="${lead.knowledge_test_date||''}"/>
          </div>
          <div class="form-group">
            <label class="form-label">Knowledge Score</label>
            <input class="form-input" id="knowScore" type="number" inputmode="numeric" placeholder="0-100" value="${lead.knowledge_test_score??''}"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Knowledge Test Result</label>
          <select class="form-select" id="knowPassed">
            <option value="" ${lead.knowledge_test_passed===null?'selected':''}>Not yet graded</option>
            <option value="true" ${lead.knowledge_test_passed===true?'selected':''}>Pass</option>
            <option value="false" ${lead.knowledge_test_passed===false?'selected':''}>Fail</option>
          </select>
        </div>
        <div class="error-box" id="testErr"></div>
        <button class="btn btn-primary btn-full" id="saveTestBtn" onclick="saveTests()">
          <span id="saveTestLabel">Save Test Results</span>
          <div class="spinner" id="saveTestSpinner" style="display:none"></div>
        </button>
      </div>

      <!-- Guarantors -->
      <div class="action-card">
        <div class="action-card-title">👥 Guarantors (${guarantors.length}/2)</div>
        ${guarantors.length ? guarantors.map(g => `
          <div class="guarantor-item">
            <div class="g-header">
              <div class="g-avatar">${g.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
              <div style="flex:1"><div class="g-name">${g.full_name}</div><div class="g-sub">${g.relationship||'—'}</div></div>
              <span class="badge ${g.verified?'badge-green':'badge-amber'}">${g.verified?'Verified':'Pending'}</span>
            </div>
            <div class="g-detail">📞 ${g.phone}</div>
            <div class="g-detail">🪪 ${g.id_number}</div>
            ${g.address ? `<div class="g-detail">📍 ${g.address}</div>` : ''}
            ${!g.verified ? `<button class="btn btn-success btn-full" style="margin-top:.625rem" onclick="verifyGuarantor('${g.id}')">✓ Mark as Verified</button>` : ''}
          </div>`).join('') : '<div style="font-size:.85rem;color:var(--gray-400);text-align:center;padding:1rem">No guarantors found.</div>'}
      </div>

      <!-- Security deposit -->
      <div class="action-card">
        <div class="action-card-title">💰 Security Deposit</div>
        <div class="deposit-status">
          <div>
            <div class="deposit-amount">GHS ${parseFloat(lead.security_deposit||0).toFixed(2)}</div>
            <div style="font-size:.75rem;color:var(--gray-400)">Required deposit amount</div>
          </div>
          <span class="badge ${lead.deposit_paid?'badge-green':'badge-amber'}">${lead.deposit_paid?'Paid':'Pending'}</span>
        </div>
        <div class="form-group">
          <label class="form-label">Deposit Amount (GHS)</label>
          <input class="form-input" id="depositAmt" type="number" inputmode="decimal" value="${lead.security_deposit||0}"/>
        </div>
        <div class="error-box" id="depositErr"></div>
        ${!lead.deposit_paid
          ? `<button class="btn btn-success btn-full" id="markPaidBtn" onclick="markDepositPaid()"><span id="markPaidLabel">✓ Mark Deposit as Paid</span><div class="spinner" id="markPaidSpinner" style="display:none"></div></button>`
          : `<button class="btn btn-outline btn-full" onclick="updateDepositAmount()">Update Amount</button>`}
      </div>

      <!-- Final decision -->
      <div class="action-card">
        <div class="action-card-title">✅ Final Decision</div>
        <p style="font-size:.82rem;color:var(--gray-500);margin-bottom:1rem;line-height:1.5">Once tests are passed, guarantors are verified, and the deposit is paid, you can approve this lead and proceed to assign them a vehicle.</p>
        <div style="display:flex;gap:.75rem">
          <button class="btn btn-danger btn-full" onclick="rejectLead()">Reject Application</button>
          <button class="btn btn-success btn-full" id="approveBtn" onclick="approveLead()" ${lead.status==='approved'?'disabled':''}>
            ${lead.status==='approved' ? '✓ Approved' : 'Approve Lead'}
          </button>
        </div>
        ${lead.status==='approved' ? `<a href="/pages/officer/assign-vehicle.html?driver=${leadProfile.id}" class="btn btn-primary btn-full" style="margin-top:.75rem">🚗 Assign Vehicle Now →</a>` : ''}
      </div>

      <!-- Notes -->
      <div class="action-card">
        <div class="action-card-title">📝 Notes</div>
        <textarea class="form-input" id="leadNotes" rows="3" style="resize:vertical" placeholder="Add notes about this lead…">${lead.notes||''}</textarea>
        <button class="btn btn-outline btn-full" style="margin-top:.75rem" onclick="saveNotes()">Save Notes</button>
      </div>
    `;
  }

  window.saveTests = async () => {
    const errEl = document.getElementById('testErr');
    errEl.classList.remove('show');
    document.getElementById('saveTestLabel').style.display='none';
    document.getElementById('saveTestSpinner').style.display='block';
    document.getElementById('saveTestBtn').disabled=true;

    const drivePassed = document.getElementById('drivePassed').value;
    const knowPassed  = document.getElementById('knowPassed').value;

    const updates = {
      drive_test_date:       document.getElementById('driveDate').value || null,
      drive_test_score:      parseInt(document.getElementById('driveScore').value) || null,
      drive_test_passed:     drivePassed === '' ? null : drivePassed === 'true',
      knowledge_test_date:   document.getElementById('knowDate').value || null,
      knowledge_test_score:  parseInt(document.getElementById('knowScore').value) || null,
      knowledge_test_passed: knowPassed === '' ? null : knowPassed === 'true',
    };

    // Auto-advance status
    if (updates.drive_test_passed === false || updates.knowledge_test_passed === false) {
      updates.status = 'test_failed';
    } else if (updates.drive_test_passed === true && updates.knowledge_test_passed === true && lead.status === 'registered') {
      updates.status = 'test_passed';
    } else if ((updates.drive_test_date || updates.knowledge_test_date) && lead.status === 'registered') {
      updates.status = 'test_scheduled';
    }

    const { error } = await db.from('leads').update(updates).eq('id', lead.id);
    if (error) { errEl.textContent=error.message; errEl.classList.add('show'); }
    else { toast('Test results saved','success'); await reload(); }

    document.getElementById('saveTestLabel').style.display='';
    document.getElementById('saveTestSpinner').style.display='none';
    document.getElementById('saveTestBtn').disabled=false;
  };

  window.verifyGuarantor = async (id) => {
    const { error } = await db.from('guarantors').update({ verified:true, verified_by:officerProfile.id, verified_at:new Date().toISOString() }).eq('id', id);
    if (error) { toast('Failed to verify','error'); return; }
    toast('Guarantor verified','success');

    // Check if both verified -> advance status
    const { data: allG } = await db.from('guarantors').select('verified').eq('lead_id', lead.id);
    if (allG && allG.every(g=>g.verified) && lead.status === 'test_passed') {
      await db.from('leads').update({ status:'guarantors_pending' }).eq('id', lead.id);
    }
    await reload();
  };

  window.markDepositPaid = async () => {
    document.getElementById('markPaidLabel').style.display='none';
    document.getElementById('markPaidSpinner').style.display='block';
    document.getElementById('markPaidBtn').disabled=true;

    const updates = { deposit_paid:true, deposit_paid_at:new Date().toISOString() };
    if (lead.status === 'guarantors_pending' || lead.status === 'deposit_pending') updates.status = 'deposit_pending';

    const { error } = await db.from('leads').update(updates).eq('id', lead.id);
    if (error) { toast('Failed to update','error'); }
    else { toast('Deposit marked as paid','success'); await reload(); }

    document.getElementById('markPaidLabel').style.display='';
    document.getElementById('markPaidSpinner').style.display='none';
  };

  window.updateDepositAmount = async () => {
    const amt = parseFloat(document.getElementById('depositAmt').value) || 0;
    const { error } = await db.from('leads').update({ security_deposit: amt }).eq('id', lead.id);
    if (error) { toast('Update failed','error'); } else { toast('Deposit amount updated','success'); await reload(); }
  };

  window.approveLead = async () => {
    if (!confirm('Approve this lead? They will be ready for vehicle assignment.')) return;
    const { error } = await db.from('leads').update({ status:'approved' }).eq('id', lead.id);
    if (error) { toast('Approval failed','error'); return; }
    toast('Lead approved! 🎉','success');
    await reload();
  };

  window.rejectLead = async () => {
    if (!confirm('Reject this application? This cannot be easily undone.')) return;
    const { error } = await db.from('leads').update({ status:'rejected' }).eq('id', lead.id);
    if (error) { toast('Failed to reject','error'); return; }
    toast('Application rejected','default');
    await reload();
  };

  window.saveNotes = async () => {
    const notes = document.getElementById('leadNotes').value.trim();
    const { error } = await db.from('leads').update({ notes: notes||null }).eq('id', lead.id);
    if (error) { toast('Failed to save notes','error'); } else { toast('Notes saved','success'); }
  };

  async function reload() {
    const { data: l } = await db.from('leads').select('*').eq('id', lead.id).single();
    lead = l;
    const { data: g } = await db.from('guarantors').select('*').eq('lead_id', lead.id);
    guarantors = g || [];
    renderContent();
  }

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href='/index.html'; return; }
    const { data: p } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!p || !['relationship_officer','super_admin'].includes(p.role)) { window.location.href='/index.html'; return; }
    officerProfile = p;

    const ini = p.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    av.textContent = ini;
    av.addEventListener('click', async () => { if(confirm('Sign out?')) { await db.auth.signOut(); window.location.href='/index.html'; } });

    const params = new URLSearchParams(location.search);
    const leadId = params.get('id');
    if (!leadId) { window.location.href='/pages/officer/leads.html'; return; }

    const { data: l } = await db.from('leads').select('*').eq('id', leadId).single();
    if (!l) { window.location.href='/pages/officer/leads.html'; return; }
    lead = l;

    const { data: lp } = await db.from('profiles').select('*').eq('id', lead.profile_id).single();
    leadProfile = lp;

    const { data: g } = await db.from('guarantors').select('*').eq('lead_id', lead.id);
    guarantors = g || [];

    renderContent();
  }
  init();
</script>
</body>
</html>
