<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — Pre-Use Checks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3; --warning:#f59e0b; --warning-bg:#fffbeb;
      --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-300:#d1d5db;
      --gray-400:#9ca3af; --gray-600:#4b5563; --gray-700:#374151;
      --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); }
    .top-bar-title { font-weight:600; font-size:1rem; flex:1; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    .filter-tabs { display:flex; gap:.5rem; margin-bottom:1rem; overflow-x:auto; scrollbar-width:none; }
    .filter-tabs::-webkit-scrollbar { display:none; }
    .filter-tab { padding:.4rem .875rem; border-radius:var(--r-full); font-size:.78rem; font-weight:600; border:1.5px solid var(--border); background:#fff; color:var(--gray-500); cursor:pointer; white-space:nowrap; transition:all .15s; }
    .filter-tab.active { background:var(--brand); border-color:var(--brand); color:#fff; }

    .check-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:1rem; margin-bottom:.75rem; box-shadow:var(--shadow-sm); }
    .check-header { display:flex; align-items:center; gap:.875rem; margin-bottom:.875rem; }
    .check-avatar { width:40px; height:40px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.85rem; flex-shrink:0; }
    .check-name { font-weight:700; font-size:.9rem; }
    .check-sub  { font-size:.75rem; color:var(--gray-400); margin-top:.1rem; }

    .check-items { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.4rem; margin-bottom:.875rem; }
    .check-item { background:var(--gray-50); border-radius:var(--r-sm); padding:.4rem .5rem; font-size:.7rem; font-weight:600; display:flex; align-items:center; gap:.3rem; }
    .check-item.ok   { color:#065f46; }
    .check-item.fail { color:#991b1b; }
    .check-item.na   { color:var(--gray-400); }

    .check-actions { display:flex; gap:.5rem; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.4rem; padding:.55rem .875rem; border:none; border-radius:var(--r-sm); font-family:var(--font-body); font-size:.78rem; font-weight:600; cursor:pointer; transition:all .15s; }
    .btn:disabled { opacity:.5; pointer-events:none; }
    .btn-approve { background:var(--success-bg); color:#065f46; border:1.5px solid #a7f3d0; }
    .btn-approve:hover { background:#a7f3d0; }
    .btn-decline { background:var(--danger-bg); color:#991b1b; border:1.5px solid #fca5a5; }
    .btn-decline:hover { background:#fca5a5; }
    .btn-view    { background:var(--gray-100); color:var(--gray-600); border:1.5px solid var(--border); }

    .badge { display:inline-flex; align-items:center; padding:.25rem .6rem; border-radius:var(--r-full); font-size:.7rem; font-weight:600; }
    .badge-green { background:var(--success-bg); color:#065f46; }
    .badge-amber { background:var(--warning-bg); color:#92400e; }
    .badge-red   { background:var(--danger-bg);  color:#991b1b; }
    .badge-gray  { background:var(--gray-100);   color:var(--gray-600); }

    .empty-state { text-align:center; padding:3rem 1rem; color:var(--gray-400); }
    .skeleton { background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { to { background-position:-200% 0; } }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:flex-end; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:var(--r-lg) var(--r-lg) 0 0; padding:1.5rem 1.25rem; width:100%; max-width:540px; max-height:85dvh; overflow-y:auto; animation:slide-up .2s ease; }
    @keyframes slide-up { from { transform:translateY(30px); opacity:0; } to { transform:none; opacity:1; } }
    .modal-handle { width:40px; height:4px; background:var(--gray-200); border-radius:2px; margin:0 auto 1.25rem; }
    .modal-title { font-family:var(--font-display); font-weight:700; font-size:1.1rem; margin-bottom:1rem; }
    .check-grid { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:1rem; }
    .check-detail { background:var(--gray-50); border-radius:var(--r-sm); padding:.625rem .75rem; font-size:.82rem; }
    .check-detail-label { color:var(--gray-400); font-size:.7rem; font-weight:600; text-transform:uppercase; margin-bottom:.2rem; }
    .check-detail-val { font-weight:600; color:var(--gray-800); }
    .check-detail-val.ok   { color:var(--success); }
    .check-detail-val.fail { color:var(--danger); }
    .officer-note-input { width:100%; background:var(--gray-50); border:1.5px solid var(--border); border-radius:var(--r-sm); color:var(--gray-800); font-family:var(--font-body); font-size:.88rem; padding:.7rem .875rem; outline:none; resize:vertical; min-height:70px; margin-bottom:1rem; }
    .officer-note-input:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(26,86,219,.12); }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; transition:color .15s; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }

    #toast-container { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:999; width:calc(100% - 2rem); max-width:420px; pointer-events:none; }
    .toast { background:var(--gray-900); color:#fff; padding:.75rem 1rem; border-radius:var(--r-md); font-size:.85rem; font-weight:500; margin-bottom:.5rem; animation:toast-in .2s ease; }
    .toast.success { background:#065f46; }
    .toast.error   { background:#991b1b; }
    @keyframes toast-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <span class="top-bar-title">Pre-Use Checks</span>
  <div class="top-bar-avatar" id="avatarBtn"></div>
</header>

<main class="page-content">
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-tab" onclick="setFilter('approved',this)">Approved</button>
    <button class="filter-tab" onclick="setFilter('declined',this)">Declined</button>
    <button class="filter-tab" onclick="setFilter('all',this)">All</button>
  </div>
  <div id="checkList"><div class="skeleton" style="height:140px;border-radius:12px;margin-bottom:.75rem"></div><div class="skeleton" style="height:140px;border-radius:12px"></div></div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <textarea class="officer-note-input" id="officerNote" placeholder="Officer notes (optional)…"></textarea>
    <div style="display:flex;gap:.75rem" id="modalActions"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/pages/officer/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
  <a href="/pages/officer/drivers.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Drivers</a>
  <a href="/pages/officer/create-lead.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>New Lead</a>
  <a href="/pages/officer/checks.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Checks</a>
  <a href="/pages/officer/fleet.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>Fleet</a>
</nav>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let officerProfile = null, allChecks = [], currentFilter = 'pending', selectedCheck = null;

  function toast(msg, type='default') { const c=document.getElementById('toast-container'); const el=document.createElement('div'); el.className='toast '+type; el.textContent=msg; c.appendChild(el); setTimeout(()=>el.remove(),3000); }

  const checkLabels = { tyres_ok:'Tyres', brakes_ok:'Brakes', lights_ok:'Lights', mirrors_ok:'Mirrors', wipers_ok:'Wipers', interior_clean:'Interior' };

  window.setFilter = (f, el) => {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    render();
  };

  function render() {
    const list = document.getElementById('checkList');
    const filtered = currentFilter === 'all' ? allChecks : allChecks.filter(c => c.status === currentFilter);
    if (!filtered.length) { list.innerHTML=`<div class="empty-state"><p>No ${currentFilter === 'all' ? '' : currentFilter} checks found.</p></div>`; return; }

    list.innerHTML = filtered.map(c => {
      const ini = c.profiles?.full_name?.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() || '??';
      const items = Object.entries(checkLabels).map(([k,label]) => `<div class="check-item ${c[k]===true?'ok':c[k]===false?'fail':'na'}">${c[k]===true?'✓':c[k]===false?'✗':'—'} ${label}</div>`).join('');
      const statusBadge = c.status==='pending'?'badge-amber':c.status==='approved'?'badge-green':'badge-red';
      return `<div class="check-card">
        <div class="check-header">
          <div class="check-avatar">${ini}</div>
          <div style="flex:1">
            <div class="check-name">${c.profiles?.full_name || 'Driver'}</div>
            <div class="check-sub">${c.check_date} · ${c.cars?.plate_number || '—'}</div>
          </div>
          <span class="badge ${statusBadge}">${c.status}</span>
        </div>
        <div class="check-items">${items}</div>
        <div class="check-actions">
          <button class="btn btn-view" onclick='openModal(${JSON.stringify(c).replace(/'/g,"&#39;")})'>View Full Check</button>
          ${c.status==='pending' ? `<button class="btn btn-approve" onclick='reviewCheck("${c.id}","approved")'>✓ Approve</button><button class="btn btn-decline" onclick='reviewCheck("${c.id}","declined")'>✗ Decline</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  window.openModal = (c) => {
    selectedCheck = c;
    document.getElementById('modalTitle').textContent = `Check — ${c.profiles?.full_name || 'Driver'} · ${c.check_date}`;
    const items = [
      ['Tyres', c.tyres_ok], ['Brakes', c.brakes_ok], ['Lights', c.lights_ok],
      ['Mirrors', c.mirrors_ok], ['Wipers', c.wipers_ok], ['Interior', c.interior_clean],
    ];
    document.getElementById('modalBody').innerHTML = `
      <div class="check-grid">
        ${items.map(([l,v]) => `<div class="check-detail"><div class="check-detail-label">${l}</div><div class="check-detail-val ${v?'ok':'fail'}">${v?'✓ OK':'✗ Fail'}</div></div>`).join('')}
        <div class="check-detail"><div class="check-detail-label">Fuel Level</div><div class="check-detail-val">${c.fuel_level||'—'}</div></div>
        <div class="check-detail"><div class="check-detail-label">Odometer</div><div class="check-detail-val">${c.odometer_start||'—'} km</div></div>
      </div>
      ${c.body_damage ? `<div style="background:var(--danger-bg);border-radius:8px;padding:.75rem;margin-bottom:.75rem;font-size:.82rem;color:#991b1b">⚠️ Body damage reported: ${c.body_damage_notes||'No details'}</div>` : ''}
      ${c.driver_notes ? `<div style="background:var(--gray-50);border-radius:8px;padding:.75rem;margin-bottom:.75rem;font-size:.82rem"><strong>Driver notes:</strong> ${c.driver_notes}</div>` : ''}
      <div style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);margin-bottom:.5rem">Officer Notes</div>`;

    const actions = document.getElementById('modalActions');
    if (c.status === 'pending') {
      actions.innerHTML = `
        <button class="btn btn-decline" style="flex:1" onclick='reviewCheck("${c.id}","declined")'>✗ Decline</button>
        <button class="btn btn-approve" style="flex:1" onclick='reviewCheck("${c.id}","approved")'>✓ Approve</button>`;
    } else {
      actions.innerHTML = `<button class="btn btn-view" style="flex:1" onclick="closeModal()">Close</button>`;
    }
    document.getElementById('officerNote').value = c.officer_notes || '';
    document.getElementById('modalOverlay').classList.add('open');
  };

  window.closeModal = (e) => { if (!e || e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); };

  window.reviewCheck = async (id, status) => {
    const note = document.getElementById('officerNote').value.trim();
    const { error } = await db.from('pre_use_checks').update({ status, reviewed_by: officerProfile.id, reviewed_at: new Date().toISOString(), officer_notes: note || null }).eq('id', id);
    if (error) { toast('Update failed', 'error'); return; }
    toast(status === 'approved' ? 'Check approved ✓' : 'Check declined', status === 'approved' ? 'success' : 'default');
    document.getElementById('modalOverlay').classList.remove('open');
    await loadChecks();
  };

  async function loadChecks() {
    const { data: asgns } = await db.from('officer_driver_assignments').select('driver_id').eq('officer_id', officerProfile.id).eq('is_active', true);
    const ids = (asgns||[]).map(a=>a.driver_id);
    if (!ids.length) { allChecks=[]; render(); return; }
    const { data } = await db.from('pre_use_checks').select('*, profiles(full_name), cars(plate_number, make, model)').in('driver_id', ids).order('submitted_at', { ascending:false });
    allChecks = data || [];
    render();
  }

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href='/index.html'; return; }
    const { data: p } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!p || !['relationship_officer','super_admin'].includes(p.role)) { window.location.href='/index.html'; return; }
    officerProfile = p;
    const ini = p.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    av.textContent = ini;
    av.addEventListener('click', async () => { if(confirm('Sign out?')) { await db.auth.signOut(); window.location.href='/index.html'; } });
    await loadChecks();
  }
  init();
</script>
</body>
</html>
