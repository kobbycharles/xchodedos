<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>xchodedos — My Leads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --brand:#1a56db; --brand-dark:#1239a5; --brand-light:#e8eeff;
      --success:#12b76a; --success-bg:#ecfdf3; --warning:#f59e0b; --warning-bg:#fffbeb;
      --danger:#ef4444; --danger-bg:#fef2f2;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563;
      --gray-700:#374151; --gray-800:#1f2937; --gray-900:#111827;
      --border:#e5e7eb; --bg:#f5f7ff;
      --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --nav-h:64px;
    }
    html { -webkit-text-size-adjust:100%; }
    body { font-family:var(--font-body); background:var(--bg); color:var(--gray-800); min-height:100dvh; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; font-family:inherit; }

    .top-bar { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; }
    .top-bar-logo { font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--brand); }
    .top-bar-title { font-weight:600; font-size:1rem; flex:1; }
    .top-bar-avatar { width:36px; height:36px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.8rem; cursor:pointer; }
    .btn-sm { padding:.4rem .875rem; font-size:.78rem; border:none; border-radius:var(--r-sm); font-family:var(--font-body); font-weight:600; cursor:pointer; text-decoration:none; }
    .btn-primary-sm { background:var(--brand); color:#fff; }

    .page-content { padding:1.25rem 1rem calc(var(--nav-h) + 1.25rem); max-width:540px; margin:0 auto; }

    .search-bar { position:relative; margin-bottom:.875rem; }
    .search-bar svg { position:absolute; left:.875rem; top:50%; transform:translateY(-50%); color:var(--gray-400); pointer-events:none; }
    .search-bar input { width:100%; background:#fff; border:1.5px solid var(--border); border-radius:var(--r-sm); color:var(--gray-800); font-family:var(--font-body); font-size:.9rem; padding:.7rem .875rem .7rem 2.6rem; outline:none; }
    .search-bar input:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(26,86,219,.12); }

    .filter-tabs { display:flex; gap:.5rem; margin-bottom:1rem; overflow-x:auto; scrollbar-width:none; }
    .filter-tabs::-webkit-scrollbar { display:none; }
    .filter-tab { padding:.4rem .875rem; border-radius:var(--r-full); font-size:.76rem; font-weight:600; border:1.5px solid var(--border); background:#fff; color:var(--gray-500); cursor:pointer; white-space:nowrap; }
    .filter-tab.active { background:var(--brand); border-color:var(--brand); color:#fff; }

    .lead-card { background:#fff; border:1px solid var(--border); border-radius:var(--r-md); padding:1rem; margin-bottom:.75rem; box-shadow:var(--shadow-sm); }
    .lead-header { display:flex; align-items:center; gap:.875rem; margin-bottom:.75rem; }
    .lead-avatar { width:42px; height:42px; border-radius:var(--r-full); background:var(--brand-light); color:var(--brand); display:grid; place-items:center; font-weight:700; font-size:.88rem; flex-shrink:0; }
    .lead-name { font-weight:700; font-size:.92rem; color:var(--gray-900); }
    .lead-sub  { font-size:.75rem; color:var(--gray-400); margin-top:.1rem; }

    .lead-progress { display:flex; gap:.3rem; margin-bottom:.75rem; }
    .progress-dot { flex:1; height:5px; border-radius:3px; background:var(--gray-200); }
    .progress-dot.done { background:var(--success); }
    .progress-dot.active { background:var(--brand); }

    .badge { display:inline-flex; padding:.25rem .6rem; border-radius:var(--r-full); font-size:.7rem; font-weight:600; white-space:nowrap; }
    .badge-green { background:var(--success-bg); color:#065f46; }
    .badge-amber { background:var(--warning-bg); color:#92400e; }
    .badge-red   { background:var(--danger-bg);  color:#991b1b; }
    .badge-blue  { background:var(--brand-light); color:var(--brand-dark); }
    .badge-gray  { background:var(--gray-100);   color:var(--gray-600); }

    .lead-meta { display:flex; gap:1rem; font-size:.78rem; color:var(--gray-500); margin-bottom:.75rem; }
    .lead-meta-item { display:flex; align-items:center; gap:.3rem; }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.4rem; padding:.55rem .875rem; border:none; border-radius:var(--r-sm); font-family:var(--font-body); font-size:.78rem; font-weight:600; cursor:pointer; text-decoration:none; width:100%; }
    .btn-outline { background:transparent; color:var(--brand); border:1.5px solid var(--brand); }

    .empty-state { text-align:center; padding:3rem 1rem; color:var(--gray-400); }
    .skeleton { background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes shimmer { to { background-position:-200% 0; } }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:#fff; border-top:1px solid var(--border); display:flex; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,.06); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2rem; border:none; background:none; color:var(--gray-400); font-size:.65rem; font-weight:500; padding:.5rem 0; text-decoration:none; }
    .nav-item svg { width:22px; height:22px; }
    .nav-item.active { color:var(--brand); }
  </style>
</head>
<body>
<header class="top-bar">
  <span class="top-bar-logo">xchodedos</span>
  <span class="top-bar-title">My Leads</span>
  <a href="/pages/officer/create-lead.html" class="btn-sm btn-primary-sm">+ New</a>
  <div class="top-bar-avatar" id="avatarBtn" style="margin-left:.5rem"></div>
</header>

<main class="page-content">
  <div class="search-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="searchInput" placeholder="Search leads…" oninput="render()"/>
  </div>
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('active',this)">In Progress</button>
    <button class="filter-tab" onclick="setFilter('approved',this)">Approved</button>
    <button class="filter-tab" onclick="setFilter('rejected',this)">Rejected</button>
    <button class="filter-tab" onclick="setFilter('all',this)">All</button>
  </div>
  <div id="leadList"><div class="skeleton" style="height:160px;border-radius:12px;margin-bottom:.75rem"></div><div class="skeleton" style="height:160px;border-radius:12px"></div></div>
</main>

<nav class="bottom-nav">
  <a href="/pages/officer/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
  <a href="/pages/officer/drivers.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Drivers</a>
  <a href="/pages/officer/leads.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>Leads</a>
  <a href="/pages/officer/checks.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Checks</a>
  <a href="/pages/officer/fleet.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>Fleet</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://kgbqjcataatpfpxfvkpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnFqY2F0YWF0cGZweGZ2a3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDk5ODksImV4cCI6MjA5NzYyNTk4OX0.qJ8qiYWxNGLRXM6QRByNdnawsOSOirVQ3azi--DLSrM';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let allLeads = [], currentFilter = 'active';

  const statusBadge = { registered:'badge-blue', test_scheduled:'badge-amber', test_passed:'badge-green', test_failed:'badge-red', guarantors_pending:'badge-amber', deposit_pending:'badge-amber', approved:'badge-green', rejected:'badge-red' };
  const statusSteps = ['registered','test_scheduled','test_passed','guarantors_pending','deposit_pending','approved'];

  function progressIndex(status) {
    if (status === 'test_failed' || status === 'rejected') return -1;
    return statusSteps.indexOf(status);
  }

  window.setFilter = (f, el) => {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    render();
  };

  window.render = () => {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const list = document.getElementById('leadList');
    let filtered = allLeads.filter(l => {
      const name = (l.profiles?.full_name||'').toLowerCase();
      const matchSearch = name.includes(q);
      const matchFilter = currentFilter==='all' ? true
        : currentFilter==='approved' ? l.status==='approved'
        : currentFilter==='rejected' ? (l.status==='rejected'||l.status==='test_failed')
        : !['approved','rejected','test_failed'].includes(l.status);
      return matchSearch && matchFilter;
    });

    if (!filtered.length) { list.innerHTML = '<div class="empty-state"><p>No leads found.</p></div>'; return; }

    list.innerHTML = filtered.map(l => {
      const p = l.profiles;
      const ini = p?.full_name?.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() || '??';
      const idx = progressIndex(l.status);
      const dots = statusSteps.map((s,i) => {
        let cls = '';
        if (idx === -1) cls = i===0 ? 'done' : '';
        else if (i < idx) cls = 'done';
        else if (i === idx) cls = 'active';
        return `<div class="progress-dot ${cls}"></div>`;
      }).join('');
      return `<div class="lead-card">
        <div class="lead-header">
          <div class="lead-avatar">${ini}</div>
          <div style="flex:1"><div class="lead-name">${p?.full_name||'Lead'}</div><div class="lead-sub">${p?.phone||p?.email||'—'}</div></div>
          <span class="badge ${statusBadge[l.status]||'badge-gray'}">${l.status.replace(/_/g,' ')}</span>
        </div>
        <div class="lead-progress">${dots}</div>
        <div class="lead-meta">
          <div class="lead-meta-item">💰 GHS ${parseFloat(l.security_deposit||0).toFixed(0)}</div>
          <div class="lead-meta-item">${l.deposit_paid?'✅':'⏳'} Deposit</div>
        </div>
        <a href="/pages/officer/lead-detail.html?id=${l.id}" class="btn btn-outline">Manage Application →</a>
      </div>`;
    }).join('');
  };

  async function init() {
    const { data:{ session } } = await db.auth.getSession();
    if (!session) { window.location.href='/index.html'; return; }
    const { data: p } = await db.from('profiles').select('*').eq('id', session.user.id).single();
    if (!p || !['relationship_officer','super_admin'].includes(p.role)) { window.location.href='/index.html'; return; }

    const ini = p.full_name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const av = document.getElementById('avatarBtn');
    if (av) { av.textContent = ini; av.addEventListener('click', async () => { if(confirm('Sign out?')) { await db.auth.signOut(); window.location.href='/index.html'; } }); }

    const { data: leads } = await db.from('leads').select('*, profiles!leads_profile_id_fkey(full_name, phone, email)').eq('created_by', p.id).order('created_at', { ascending:false });
    allLeads = leads || [];
    render();
  }
  init();
</script>
</body>
</html>
