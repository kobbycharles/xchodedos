<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1a56db"/>
  <title>xchodedos — Admin Dashboard</title>
  <link rel="stylesheet" href="/css/app.css"/>
  <style>
    .greeting { margin-bottom: 1.5rem; }
    .greeting-name {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gray-900);
      letter-spacing: -.02em;
    }
    .greeting-role {
      font-size: .8rem;
      color: var(--gray-400);
      margin-top: .15rem;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }

    .qa-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 1rem .875rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: .5rem;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
      text-decoration: none;
    }

    .qa-btn:hover { border-color: var(--brand); box-shadow: var(--shadow-md); }

    .qa-icon {
      width: 36px; height: 36px;
      border-radius: var(--r-sm);
      display: grid;
      place-items: center;
    }

    .qa-icon.blue  { background: var(--brand-light); color: var(--brand); }
    .qa-icon.green { background: var(--success-bg);  color: var(--success); }
    .qa-icon.amber { background: var(--warning-bg);  color: var(--warning); }
    .qa-icon.red   { background: var(--danger-bg);   color: var(--danger); }

    .qa-label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--gray-700);
      line-height: 1.3;
    }

    /* Skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- Top bar -->
  <header class="top-bar">
    <span class="top-bar-logo">xchodedos</span>
    <span class="top-bar-title"></span>
    <div class="top-bar-avatar" id="avatarBtn" style="cursor:pointer" title="Sign out"></div>
  </header>

  <main class="page-content">

    <!-- Greeting -->
    <div class="greeting">
      <div class="greeting-name" id="greetName">Good morning 👋</div>
      <div class="greeting-role">Super Admin</div>
    </div>

    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card brand">
        <div class="stat-value" id="statDrivers">—</div>
        <div class="stat-label">Active Drivers</div>
      </div>
      <div class="stat-card green">
        <div class="stat-value" id="statOfficers">—</div>
        <div class="stat-label">Officers</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-value" id="statLeads">—</div>
        <div class="stat-label">Active Leads</div>
      </div>
      <div class="stat-card red">
        <div class="stat-value" id="statCars">—</div>
        <div class="stat-label">Fleet Cars</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="section-head">
      <span class="section-title">Quick Actions</span>
    </div>

    <div class="quick-actions">
      <a href="/pages/admin/create-officer.html" class="qa-btn">
        <div class="qa-icon blue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/>
          </svg>
        </div>
        <span class="qa-label">New Officer Account</span>
      </a>

      <a href="/pages/admin/officers.html" class="qa-btn">
        <div class="qa-icon green">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <span class="qa-label">Manage Officers</span>
      </a>

      <a href="/pages/admin/assign-driver.html" class="qa-btn">
        <div class="qa-icon amber">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </div>
        <span class="qa-label">Assign Driver to Officer</span>
      </a>

      <a href="/pages/admin/settings.html" class="qa-btn">
        <div class="qa-icon red">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </div>
        <span class="qa-label">Settings</span>
      </a>
    </div>

    <!-- Recent Officers -->
    <div class="section-head">
      <span class="section-title">Relationship Officers</span>
      <a href="/pages/admin/officers.html" style="font-size:.8rem;color:var(--brand)">View all</a>
    </div>

    <div class="card" id="officerList">
      <div style="padding:.5rem 0">
        <div class="skeleton" style="height:14px;width:60%;margin-bottom:.75rem"></div>
        <div class="skeleton" style="height:14px;width:40%"></div>
      </div>
    </div>

  </main>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="/pages/admin/dashboard.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Dashboard
    </a>
    <a href="/pages/admin/officers.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Officers
    </a>
    <a href="/pages/admin/assign-driver.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
      Assign
    </a>
    <a href="/pages/admin/settings.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
  import { requireRole, logout, getCurrentProfile } from '/js/auth.js';
  import db from '/js/supabase.js';
  import { toast } from '/js/toast.js';

  const profile = await requireRole('super_admin');
  if (!profile) throw new Error('Unauthorized');

  // Greeting
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greetName').textContent = `${greet}, ${profile.full_name.split(' ')[0]} 👋`;

  // Avatar initials + logout
  const initials = profile.full_name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
  const av = document.getElementById('avatarBtn');
  av.textContent = initials;
  av.addEventListener('click', async () => {
    if (confirm('Sign out?')) await logout();
  });

  // Load stats
  const [driversRes, officersRes, leadsRes, carsRes] = await Promise.all([
    db.from('profiles').select('id', { count: 'exact', head: true }).eq('role', 'driver').eq('is_active', true),
    db.from('profiles').select('id', { count: 'exact', head: true }).eq('role', 'relationship_officer').eq('is_active', true),
    db.from('leads').select('id', { count: 'exact', head: true }).neq('status', 'approved').neq('status', 'rejected'),
    db.from('cars').select('id', { count: 'exact', head: true }).neq('status', 'retired'),
  ]);

  document.getElementById('statDrivers').textContent = driversRes.count ?? '—';
  document.getElementById('statOfficers').textContent = officersRes.count ?? '—';
  document.getElementById('statLeads').textContent = leadsRes.count ?? '—';
  document.getElementById('statCars').textContent = carsRes.count ?? '—';

  // Load recent officers
  const { data: officers, error } = await db
    .from('profiles')
    .select('id, full_name, email, phone, is_active')
    .eq('role', 'relationship_officer')
    .order('created_at', { ascending: false })
    .limit(5);

  const list = document.getElementById('officerList');

  if (!officers || officers.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <p>No officers yet. <a href="/pages/admin/create-officer.html" style="color:var(--brand)">Create one →</a></p>
    </div>`;
  } else {
    list.innerHTML = officers.map(o => {
      const ini = o.full_name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
      return `<div class="list-row">
        <div class="list-avatar">${ini}</div>
        <div>
          <div class="list-name">${o.full_name}</div>
          <div class="list-sub">${o.email}</div>
        </div>
        <div class="list-right">
          <span class="badge ${o.is_active ? 'badge-green' : 'badge-gray'}">${o.is_active ? 'Active' : 'Inactive'}</span>
        </div>
      </div>`;
    }).join('');
  }
</script>
</body>
</html>
